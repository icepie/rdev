<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/boot.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDev GPU Desktop - {{DEVICE_ID_HTML}}</title>
    <style>
        :root { color-scheme: dark; }
        :root[data-theme="dark"] { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --text:#e4e4e7; --muted:#71717a; --accent:#22d3ee; --green:#4ade80; --red:#f87171; --yellow:#facc15; }
        :root[data-theme="light"] { color-scheme: light; --bg:#f6f8fb; --card:#fff; --border:#d8dee9; --text:#1f2937; --muted:#6b7280; --accent:#0891b2; --green:#16a34a; --red:#dc2626; --yellow:#ca8a04; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { height:100vh; height:100dvh; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; flex-direction:column; overflow:hidden; }
        .icon { width:1em; height:1em; vertical-align:-0.16em; flex-shrink:0; }
        .icon-inline { display:inline-flex; align-items:center; gap:6px; }
        .theme-toggle { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:var(--card); color:var(--muted); border-radius:7px; padding:4px 8px; cursor:pointer; font-size:.78rem; }
        .toolbar { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
        .logo { font-size:.9rem; font-weight:700; color:var(--accent); white-space:nowrap; }
        .device { color:var(--muted); font-size:.82rem; white-space:nowrap; }
        .spacer { flex:1; }
        .controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-width:0; }
        .controls label { display:inline-flex; align-items:center; gap:5px; color:var(--muted); font-size:.82rem; white-space:nowrap; }
        .controls select, .controls input { border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); padding:5px 8px; font-size:.82rem; outline:none; }
        .controls select { max-width:260px; }
        .controls input[type="checkbox"] { width:auto; padding:0; }
        .btn { border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); padding:5px 9px; font-size:.82rem; cursor:pointer; }
        .btn:hover { border-color:var(--accent); color:var(--accent); }
        .status { color:var(--muted); font-size:.82rem; white-space:nowrap; }
        .status.ok { color:var(--green); }
        .status.warn { color:var(--yellow); }
        .status.err { color:var(--red); }
        .stage { flex:1; min-height:0; display:flex; flex-direction:column; padding:12px; gap:8px; overflow:hidden; }
        .viewer { position:relative; flex:1; min-height:0; border:1px solid var(--border); border-radius:10px; background:#000; overflow:hidden; box-shadow:0 16px 40px rgba(0,0,0,.20); }
        #video { width:100%; height:100%; object-fit:contain; background:#000; display:block; }
        #overlay { position:absolute; inset:0; outline:none; touch-action:none; cursor:crosshair; }
        #empty { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:var(--muted); line-height:1.8; padding:24px; pointer-events:none; background:radial-gradient(circle at center, rgba(34,211,238,.07), transparent 42%); }
        #empty strong { color:var(--text); font-size:1rem; margin-bottom:4px; }
        .meta { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:.78rem; flex-wrap:wrap; min-height:22px; }
        .meta span.ok { color:var(--green); }
        .meta span.warn { color:var(--yellow); }
        .meta span.err { color:var(--red); }
        details.debug { flex-shrink:0; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--muted); font-size:.78rem; }
        details.debug summary { cursor:pointer; padding:6px 9px; color:var(--muted); user-select:none; }
        #log { max-height:96px; overflow:auto; padding:0 9px 8px; color:var(--muted); font:12px/1.45 ui-monospace,SFMono-Regular,Consolas,monospace; white-space:pre-wrap; }
        #log .ok { color:var(--green); }
        #log .warn { color:var(--yellow); }
        #log .err { color:var(--red); }
        @media (max-width:720px) { .toolbar { align-items:stretch; } .controls { width:100%; } .controls > * { flex:1 1 auto; } .controls select { max-width:none; } .status { width:100%; } }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="logo">RDev <span>GPU Desktop</span></div>
        <div class="device">{{DEVICE_ID_HTML}}</div>
        <div class="spacer"></div>
        <div class="controls">
            <label>Source <select id="source"><option value="">正在读取画面来源...</option></select></label>
            <label>Encoder <select id="encoder"><option value="auto">自动</option></select></label>
            <label><input id="cursor" type="checkbox"> Capture cursor</label>
            <button class="btn" id="refresh">刷新</button>
            <button class="btn" id="reconnect">重连</button>
        </div>
        <div id="theme-slot"></div>
        <span id="status" class="status">Idle</span>
    </div>
    <div class="stage">
        <div class="viewer">
            <video id="video" autoplay muted playsinline></video>
            <div id="overlay" tabindex="0" aria-label="remote desktop input area"></div>
            <div id="empty"><strong>等待 GPU 桌面视频流</strong><span>连接后会自动读取画面来源并开始播放。</span></div>
        </div>
        <div class="meta">
            <span id="sourceInfo">source: —</span>
            <span id="captureInfo">capture: —</span>
            <span id="encoderInfo">encoder: —</span>
            <span id="inputInfo">input: —</span>
            <span id="frameInfo">frames: 0</span>
        </div>
        <details class="debug">
            <summary>诊断日志</summary>
            <pre id="log"></pre>
        </details>
    </div>
    <script src="/ui.js"></script>
    <script>
    (() => {
        if (window.RDevUI) document.getElementById('theme-slot').innerHTML = RDevUI.themeButton();
        const deviceId = {{DEVICE_ID_JS}};
        const source = document.getElementById('source');
        const encoder = document.getElementById('encoder');
        const cursor = document.getElementById('cursor');
        const refresh = document.getElementById('refresh');
        const reconnect = document.getElementById('reconnect');
        const status = document.getElementById('status');
        const logBox = document.getElementById('log');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const empty = document.getElementById('empty');
        const sourceInfo = document.getElementById('sourceInfo');
        const captureInfo = document.getElementById('captureInfo');
        const encoderInfo = document.getElementById('encoderInfo');
        const inputInfo = document.getElementById('inputInfo');
        const frameInfo = document.getElementById('frameInfo');
        const storagePrefix = 'rdevGpuDesktop.';
        let ws = null, mediaSource = null, sourceBuffer = null, queue = [], connected = false;
        let lastPointer = new Map(), frames = 0, bytes = 0, startedAt = 0;

        source.value = localStorage.getItem(storagePrefix + 'source') || '';
        encoder.value = localStorage.getItem(storagePrefix + 'encoder') || 'auto';
        cursor.checked = localStorage.getItem(storagePrefix + 'cursor') === 'true';

        function log(message, cls) {
            const line = document.createElement('div');
            line.textContent = new Date().toLocaleTimeString() + ' ' + message;
            if (cls) line.className = cls;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
        }
        function setStatus(message, cls) { status.textContent = message; status.className = 'status ' + (cls || ''); }
        function setInfo(elem, label, value, cls) { elem.textContent = label + ': ' + (value || '—'); elem.className = cls || ''; }
        function wsURL() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            return proto + '//' + location.host + '/gpu-desktop/' + encodeURIComponent(deviceId) + '/ws' + location.search;
        }
        function send(message) {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(message));
        }
        function sendConfig() {
            if (!source.value) return;
            localStorage.setItem(storagePrefix + 'source', source.value);
            localStorage.setItem(storagePrefix + 'encoder', encoder.value || 'auto');
            localStorage.setItem(storagePrefix + 'cursor', String(cursor.checked));
            const rect = overlay.getBoundingClientRect();
            send({Config:{
                capturable_id:Number(source.value),
                capture_cursor:cursor.checked,
                max_width:Math.max(640, Math.round(rect.width * devicePixelRatio)),
                max_height:Math.max(480, Math.round(rect.height * devicePixelRatio)),
                client_name:'rdev-browser',
                frame_rate:30,
                encoder:encoder.value || 'auto',
                pointer_backend:'auto',
                keyboard_backend:'auto'
            }});
        }
        function updateFrameInfo() {
            const seconds = Math.max(1, (performance.now() - startedAt) / 1000);
            frameInfo.textContent = 'frames: ' + frames + ' · ' + (frames / seconds).toFixed(1) + ' fps · ' + Math.round(bytes / 1024) + ' KiB';
        }
        function updateBuffer() {
            if (!sourceBuffer || sourceBuffer.updating || mediaSource.readyState !== 'open' || queue.length === 0) return;
            try { sourceBuffer.appendBuffer(queue.shift()); } catch (err) { log('视频缓冲错误: ' + err, 'err'); queue = []; }
        }
        function startMedia() {
            const MS = window.ManagedMediaSource || window.MediaSource;
            if (!MS) { log('浏览器不支持 MediaSource，无法播放 GPU 视频流', 'err'); setStatus('MediaSource unsupported', 'err'); return; }
            mediaSource = new MS(); sourceBuffer = null; queue = []; frames = 0; bytes = 0; startedAt = performance.now(); updateFrameInfo();
            video.src = URL.createObjectURL(mediaSource);
            mediaSource.addEventListener('sourceopen', () => {
                let mime = 'video/mp4; codecs="avc1.4D403D"';
                if (!MS.isTypeSupported(mime)) mime = 'video/mp4';
                sourceBuffer = mediaSource.addSourceBuffer(mime);
                sourceBuffer.addEventListener('updateend', updateBuffer);
            }, {once:true});
        }
        function onSources(list) {
            const previousName = source.selectedOptions[0] ? source.selectedOptions[0].textContent : '';
            const saved = localStorage.getItem(storagePrefix + 'source') || '';
            source.textContent = '';
            if (!list || list.length === 0) {
                const option = document.createElement('option'); option.value = ''; option.textContent = '无可用画面来源'; source.appendChild(option);
                empty.innerHTML = '<strong>没有可用画面来源</strong><span>请确认 Win7 已登录到真实桌面，或点击刷新重试。</span>';
                setStatus('来源为空', 'err'); setInfo(sourceInfo, 'source', 'empty', 'err'); log('画面来源列表为空', 'err'); return;
            }
            list.forEach((name, index) => {
                const option = document.createElement('option');
                option.value = String(index); option.textContent = name; source.appendChild(option);
            });
            const same = [...source.options].find(o => o.textContent === previousName);
            if (saved && [...source.options].some(o => o.value === saved)) source.value = saved;
            else if (same) source.value = same.value;
            else source.value = '0';
            setInfo(sourceInfo, 'source', source.selectedOptions[0] ? source.selectedOptions[0].textContent : source.value, 'ok');
            log('画面来源: ' + list.join(', '), 'ok');
            sendConfig();
        }
        function onEncoderCapabilities(options) {
            const current = localStorage.getItem(storagePrefix + 'encoder') || encoder.value || 'auto';
            encoder.textContent = '';
            (options || []).forEach(opt => {
                if (!opt || !opt.value) return;
                const option = document.createElement('option'); option.value = opt.value; option.textContent = opt.label || opt.value; encoder.appendChild(option);
            });
            if (![...encoder.options].some(o => o.value === current)) {
                const option = document.createElement('option'); option.value = 'auto'; option.textContent = '自动'; encoder.insertBefore(option, encoder.firstChild);
            }
            encoder.value = [...encoder.options].some(o => o.value === current) ? current : 'auto';
        }
        function connect() {
            if (ws) ws.close();
            connected = false; queue = []; setStatus('Connecting...'); empty.innerHTML = '<strong>正在连接 GPU 桌面</strong><span>连接建立后会自动读取画面来源。</span>';
            ws = new WebSocket(wsURL()); ws.binaryType = 'arraybuffer';
            ws.onopen = () => { setStatus('Connected', 'ok'); log('WS 已连接', 'ok'); send('GetCapturableList'); sendConfig(); };
            ws.onerror = () => { setStatus('Connection error', 'err'); log('WS 连接错误', 'err'); };
            ws.onclose = () => { setStatus('Closed', 'warn'); connected = false; log('WS 已断开', 'warn'); };
            ws.onmessage = event => {
                if (typeof event.data === 'string') {
                    let msg; try { msg = JSON.parse(event.data); } catch { return; }
                    if (msg === 'NewVideo') { startMedia(); empty.textContent = ''; }
                    else if (msg === 'ConfigOk') { connected = true; empty.textContent = ''; setStatus('Playing', 'ok'); }
                    else if (msg && msg.CapturableList) onSources(msg.CapturableList);
                    else if (msg && msg.EncoderCapabilities) onEncoderCapabilities(msg.EncoderCapabilities.options || []);
                    else if (msg && msg.RuntimeStatus) {
                        const s = msg.RuntimeStatus;
                        if (s.captureBackend !== undefined) setInfo(captureInfo, 'capture', s.captureBackend, s.captureBackend ? 'ok' : 'warn');
                        if (s.encoderBackend !== undefined) setInfo(encoderInfo, 'encoder', s.encoderBackend, s.encoderBackend ? 'ok' : 'warn');
                        const input = [s.inputBackend, s.pointerBackend, s.keyboardBackend].filter(Boolean).join(' / ');
                        if (input) setInfo(inputInfo, 'input', input, input.includes('不可用') || input.includes('backend 不可用') ? 'warn' : 'ok');
                    }
                    else if (msg && msg.ConfigError) { setStatus('Config error', 'err'); log(msg.ConfigError, 'err'); }
                    else if (msg && msg.Error) { setStatus('Error', 'err'); log(msg.Error, 'err'); }
                    return;
                }
                bytes += event.data.byteLength || event.data.size || 0; frames++; updateFrameInfo();
                queue.push(event.data); updateBuffer();
                if (video.seekable.length > 0) {
                    const end = video.seekable.end(video.seekable.length - 1);
                    if (Number.isFinite(end) && (video.readyState >= 3 || end - video.currentTime > 2)) video.currentTime = end;
                }
            };
        }
        function pointerBits(button) { return button === 0 ? 1 : button === 2 ? 2 : button === 1 ? 4 : 0; }
        function pointerMessage(event) {
            const rect = overlay.getBoundingClientRect();
            const x = Math.max(0, Math.min(1, (event.clientX - rect.left) / Math.max(1, rect.width)));
            const y = Math.max(0, Math.min(1, (event.clientY - rect.top) / Math.max(1, rect.height)));
            const previous = lastPointer.get(event.pointerId) || {x:event.clientX,y:event.clientY};
            lastPointer.set(event.pointerId, {x:event.clientX,y:event.clientY});
            return {PointerEvent:{event_type:event.type,pointer_id:event.pointerId,timestamp:Math.round(event.timeStamp),is_primary:event.isPrimary,pointer_type:event.pointerType||'mouse',button:pointerBits(event.button),buttons:event.buttons,x:x,y:y,movement_x:Math.round(event.movementX || event.clientX - previous.x),movement_y:Math.round(event.movementY || event.clientY - previous.y),pressure:event.pressure || (event.buttons ? 0.5 : 0),tilt_x:event.tiltX || 0,tilt_y:event.tiltY || 0,twist:event.twist || 0,width:event.width || 1,height:event.height || 1}};
        }
        ['pointerdown','pointermove','pointerup','pointercancel','pointerover','pointerenter','pointerleave','pointerout'].forEach(type => overlay.addEventListener(type, event => {
            if (!connected && type !== 'pointermove') return;
            overlay.focus(); if (type === 'pointerdown') overlay.setPointerCapture(event.pointerId);
            send(pointerMessage(event)); event.preventDefault();
        }));
        overlay.addEventListener('wheel', event => { send({WheelEvent:{dx:Math.round(event.deltaX),dy:Math.round(event.deltaY),timestamp:Math.round(event.timeStamp)}}); event.preventDefault(); }, {passive:false});
        function keyMessage(event, eventType) { return {KeyboardEvent:{event_type:eventType,code:event.code,key:event.key,location:event.location,alt:event.altKey,ctrl:event.ctrlKey,shift:event.shiftKey,meta:event.metaKey}}; }
        overlay.addEventListener('keydown', event => { send(keyMessage(event, event.repeat ? 'repeat' : 'down')); event.preventDefault(); });
        overlay.addEventListener('keyup', event => { send(keyMessage(event, 'up')); event.preventDefault(); });
        source.onchange = sendConfig;
        encoder.onchange = sendConfig;
        cursor.onchange = sendConfig;
        refresh.onclick = () => send('GetCapturableList');
        reconnect.onclick = connect;
        window.onresize = sendConfig;
        connect();
    })();
    </script>
</body>
</html>
