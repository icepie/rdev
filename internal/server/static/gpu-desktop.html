<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDev GPU Desktop</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/i18n.js"></script>
  <script src="/ui.js"></script>
  <style>
    body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 32px 18px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; box-shadow: var(--shadow); }
    h1 { font-size: 1.45rem; margin-bottom: 8px; }
    p { color: var(--muted); margin-bottom: 18px; }
    label { display: block; margin: 14px 0 6px; color: var(--muted); font-size: 0.9rem; }
    select, input { width: 100%; padding: 11px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .btn { border: 0; border-radius: 10px; padding: 11px 16px; background: var(--accent); color: #061015; font-weight: 700; cursor: pointer; }
    .btn.secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    .status { margin-top: 14px; min-height: 1.4em; color: var(--muted); }
    .bad { color: var(--red); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>RDev GPU Desktop</h1>
      <p>通过 RDev 服务端隧道打开客户端本地 AuroraOps/Weylus 桌面服务。</p>
      <label>设备</label>
      <select id="device"></select>
      <label>设备密码</label>
      <input id="password" type="password" placeholder="设备无密码时留空" autocomplete="current-password">
      <div class="row">
        <button class="btn" id="open">打开 GPU 桌面</button>
        <a class="btn secondary" id="back" href="/">返回设备列表</a>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>
<script>
const params = new URLSearchParams(location.search);
const adminToken = params.get('token') || localStorage.getItem('rdevAdminToken') || '';
if (adminToken) localStorage.setItem('rdevAdminToken', adminToken);
function authURL(path) { return adminToken ? path + (path.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(adminToken) : path; }
document.getElementById('back').href = authURL('/');
function setStatus(text, bad=false) { const el = document.getElementById('status'); el.textContent = text; el.className = bad ? 'status bad' : 'status'; }
async function loadDevices() {
  const select = document.getElementById('device');
  const res = await fetch(authURL('/api/devices'));
  if (!res.ok) { setStatus('无法加载设备，请检查 admin token。', true); return; }
  const devices = await res.json();
  const wanted = params.get('device') || '';
  select.innerHTML = devices.map(d => `<option value="${d.id.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" ${d.id===wanted?'selected':''}>${d.id}${d.gpuDesktop ? ' · GPU tunnel online' : ' · GPU tunnel offline'}</option>`).join('');
  if (!devices.length) setStatus('暂无在线设备。', true);
}
document.getElementById('open').onclick = () => {
  const device = document.getElementById('device').value;
  if (!device) { setStatus('请选择设备。', true); return; }
  const query = new URLSearchParams();
  if (adminToken) query.set('token', adminToken);
  const password = document.getElementById('password').value;
  if (password) query.set('password', password);
  location.href = `/gpu-desktop/${encodeURIComponent(device)}/` + (query.toString() ? '?' + query.toString() : '');
};
loadDevices().catch(err => setStatus(String(err), true));
</script>
</body>
</html>
