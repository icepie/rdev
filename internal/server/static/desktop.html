<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/boot.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.desktop">RDev Desktop</title>
    <style>
        :root { color-scheme: dark; }
        :root[data-theme="dark"] { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --text:#e4e4e7; --muted:#71717a; --accent:#22d3ee; --green:#4ade80; --red:#f87171; --yellow:#facc15; }
        :root[data-theme="light"] { color-scheme: light; --bg:#f6f8fb; --card:#fff; --border:#d8dee9; --text:#1f2937; --muted:#6b7280; --accent:#0891b2; --green:#16a34a; --red:#dc2626; --yellow:#ca8a04; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { height:100vh; height:100dvh; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; flex-direction:column; overflow:hidden; }
        .icon { width:1em; height:1em; vertical-align:-0.16em; flex-shrink:0; }
        .icon-inline { display:inline-flex; align-items:center; gap:6px; }
        .theme-toggle { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:var(--card); color:var(--muted); border-radius:7px; padding:4px 8px; cursor:pointer; font-size:.78rem; }
        .toolbar { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0; }
        .logo { font-size:.9rem; font-weight:700; color:var(--accent); white-space:nowrap; }
        .spacer { flex:1; }
        .nav { display:flex; gap:6px; }
        .nav a { color:var(--muted); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:.78rem; text-decoration:none; }
        .nav a:hover { color:var(--accent); border-color:var(--accent); }
        .lang-switch { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:.78rem; }
        .controls { display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--card); border-bottom:1px solid var(--border); flex-wrap:wrap; }
        .controls select, .controls input { border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); padding:7px 10px; font-size:.9rem; outline:none; }
        .controls input { min-width:180px; }
        .controls input.small { min-width:64px; width:86px; }
        .settings { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--card); border-bottom:1px solid var(--border); flex-wrap:wrap; color:var(--muted); font-size:.82rem; }
        .settings label { display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
        .settings select, .settings input { border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); padding:5px 8px; font-size:.82rem; outline:none; }
        .settings input { width:72px; }
        .settings input[type="checkbox"] { width:auto; }
        .settings input[type="range"] { width:112px; padding:0; }
        .settings output { min-width:42px; color:var(--text); }
        .settings .btn { padding:5px 9px; font-size:.82rem; }
        .settings .fit-select { width:auto; }
        .advanced-settings { display:none; align-items:center; gap:8px; flex-wrap:wrap; width:100%; padding-top:6px; border-top:1px solid var(--border); }
        .advanced-settings.open { display:flex; }
        .manual-settings[data-disabled="true"] { opacity:.45; pointer-events:none; }
        .btn { border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); padding:7px 12px; cursor:pointer; }
        .btn:hover { border-color:var(--accent); color:var(--accent); }
        .status { color:var(--muted); font-size:.86rem; }
        .status.ok { color:var(--green); }
        .status.warn { color:var(--yellow); }
        .status.err { color:var(--red); }
        .stage { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:12px; overflow:auto; }
        .settings[data-gpu-device="true"] .legacy-setting { display:none; }
        .gpu-setting { display:none !important; }
        .settings[data-gpu-device="true"] .gpu-setting { display:inline-flex !important; }
        .stage[data-gpu="true"] { align-items:stretch; justify-content:stretch; overflow:hidden; flex-direction:column; gap:8px; }
        .stage[data-fit="actual"] { align-items:flex-start; justify-content:flex-start; }
        .stage[data-gpu="true"][data-fit="actual"] { align-items:stretch; justify-content:stretch; }
        .stage[data-control="true"] canvas, .stage[data-control="true"] .gpu-overlay { cursor:crosshair; }
        .stage[data-cursor="true"] canvas { cursor:none; }
        canvas { background:#000; border:1px solid var(--border); border-radius:10px; image-rendering:auto; outline:none; }
        .stage[data-fit="fit"] canvas { max-width:100%; max-height:100%; }
        .stage[data-fit="actual"] canvas { max-width:none; max-height:none; }
        .gpu-viewer { position:relative; flex:1; min-height:0; width:100%; border:1px solid var(--border); border-radius:10px; background:#000; overflow:hidden; box-shadow:0 16px 40px rgba(0,0,0,.20); }
        .gpu-viewer video, .gpu-viewer canvas { width:100%; height:100%; object-fit:contain; background:#000; display:block; }
        .gpu-overlay { position:absolute; inset:0; outline:none; touch-action:none; }
        .gpu-empty { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:var(--muted); line-height:1.8; padding:24px; pointer-events:none; background:radial-gradient(circle at center, rgba(34,211,238,.07), transparent 42%); }
        .gpu-empty strong { color:var(--text); font-size:1rem; margin-bottom:4px; }
        .empty { color:var(--muted); text-align:center; line-height:1.8; }
        @media (max-width:720px) { .toolbar { flex-wrap:wrap; } .nav { width:100%; overflow-x:auto; } .controls > * { flex:1 1 auto; } }
    </style>
  <script type="module" crossorigin src="/assets/desktop-Dx8zvg3F.js"></script>
</head>
<body>
    <div class="toolbar">
        <div class="logo">RDev <span data-i18n="nav.desktop">Desktop</span></div>
        <div class="spacer"></div>
        <div id="lang-slot"></div>
        <div class="nav">
            <a href="/" data-auth-link data-i18n="nav.dashboard">Dashboard</a>
            <a href="/terminal.html" data-auth-link data-i18n="nav.terminal">Terminal</a>
            <a href="/files.html" data-auth-link data-i18n="nav.files">Files</a>
            <a href="/sessions.html" data-auth-link data-i18n="nav.sessions">Sessions</a>
            <a href="/desktop.html" data-auth-link data-i18n="nav.desktop">Desktop</a>
        </div>
    </div>
    <div class="controls">
        <select id="device"><option value="" data-i18n="terminal.devicePlaceholder">-- device --</option></select>
        <input id="password" type="password" data-i18n-placeholder="terminal.passwordPlaceholder" placeholder="输入密码">
        <button class="btn" id="connect" data-i18n="common.connect">连接</button>
        <button class="btn" id="disconnect" data-i18n="desktop.disconnect">断开</button>
        <span id="status" class="status" data-i18n="desktop.idle">Idle</span>
    </div>
    <div class="settings" id="settings">
        <label class="legacy-setting"><span data-i18n="desktop.mode">Mode</span><select id="mode"><option value="auto" data-i18n="desktop.modeAuto">Auto</option><option value="manual" data-i18n="desktop.modeManual">Manual</option></select></label>
        <label class="legacy-setting"><span data-i18n="desktop.source">Source</span><select id="source"><option value="auto" data-i18n="desktop.sourceAuto">Auto</option><option value="screen:all" data-i18n="desktop.sourceAll">All screens</option></select></label>
        <span class="manual-settings legacy-setting" id="manual-settings">
            <label><span data-i18n="desktop.fps">FPS</span><input id="fps" type="number" min="1" max="12" value="4"></label>
            <label><span data-i18n="desktop.quality">Quality</span><input id="quality" type="number" min="25" max="90" value="50"></label>
            <label><span data-i18n="desktop.maxWidth">Max W</span><input id="maxWidth" type="number" min="320" max="3840" value="1600"></label>
            <label><span data-i18n="desktop.maxHeight">Max H</span><input id="maxHeight" type="number" min="240" max="2160" value="1000"></label>
        </span>
        <label class="gpu-setting"><span data-i18n="desktop.source">Source</span><select id="gpuSource"><option value="">正在读取画面来源...</option></select></label>
        <label class="gpu-setting"><span>Video</span><select id="gpuEncoder"><option value="auto">自动</option></select></label>
        <button class="btn gpu-setting" id="gpuRefresh">刷新来源</button>
        <button class="btn gpu-setting" id="gpuAdvancedToggle" type="button">高级</button>
        <label><input id="controlInput" type="checkbox" style="width:auto"> <span data-i18n="desktop.control">Control</span></label>
        <label><input id="showCursor" type="checkbox" style="width:auto"> <span data-i18n="desktop.showCursor">Show cursor</span></label>
        <label class="legacy-setting"><span data-i18n="desktop.inputBackend">Input</span><select id="inputBackend" class="fit-select"><option value="auto" data-i18n="desktop.inputAuto">Auto</option></select></label>
        <label><span data-i18n="desktop.view">View</span><select id="fitMode" class="fit-select"><option value="fit" data-i18n="desktop.fit">Fit</option><option value="actual" data-i18n="desktop.actual">Actual</option></select></label>
        <button class="btn legacy-setting" id="syncVNC" data-i18n="desktop.syncVNC">Sync to VNC</button>
        <button class="btn" id="screenshot" data-i18n="desktop.screenshot">Screenshot</button>
        <button class="btn" id="fullscreen" data-i18n="desktop.fullscreen">Fullscreen</button>
        <span id="frameInfo" class="status"></span>
        <div class="advanced-settings gpu-setting" id="gpuAdvanced">
            <label><input id="gpuEnableVideo" type="checkbox" checked> 视频</label>
            <label><input id="gpuLowLatency" type="checkbox" checked> 低延迟</label>
            <label><input id="gpuStretch" type="checkbox"> 拉伸</label>
            <label><input id="gpuEnableMouse" type="checkbox" checked> 鼠标</label>
            <label><input id="gpuEnablePen" type="checkbox" checked> 手写笔</label>
            <label><input id="gpuEnableTouch" type="checkbox" checked> 触控</label>
            <label>分辨率 <input id="gpuScale" type="range" min="0.1" max="2" step="0.01" value="1.5"><output id="gpuScaleOut">auto</output></label>
            <label>帧率 <input id="gpuFrameRate" type="range" min="0" max="120" step="1" value="30"><output id="gpuFrameRateOut">30</output></label>
            <label>鼠标输入 <select id="gpuPointerBackend" class="fit-select"><option value="auto">自动</option></select></label>
            <label>键盘输入 <select id="gpuKeyboardBackend" class="fit-select"><option value="auto">自动</option></select></label>
            <label>最小压感 <input id="gpuMinPressure" type="range" min="0" max="1" step="0.01" value="0"></label>
        </div>
    </div>
    <div class="stage" id="stage" data-fit="fit" data-gpu="false">
        <canvas id="screen" style="display:none" tabindex="0"></canvas>
        <div id="gpuViewer" class="gpu-viewer" style="display:none">
            <video id="gpuVideo" autoplay muted playsinline></video>
            <canvas id="gpuCanvas" style="display:none"></canvas>
            <div id="gpuOverlay" class="gpu-overlay" tabindex="0" aria-label="remote desktop input area"></div>
            <div id="gpuEmpty" class="gpu-empty"><strong>等待远程桌面画面</strong><span>连接后会自动读取画面来源并开始播放。</span></div>
        </div>
        <div id="empty" class="empty" data-i18n="desktop.empty">Select a device and connect.</div>
    </div>

    <script src="/i18n.js"></script>
    <script src="/ui.js"></script>

</body>
</html>
