<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/boot.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.desktop">RDev Desktop</title>
    <style>
        :root { color-scheme: dark; }
        :root[data-theme="dark"] { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --text:#e4e4e7; --muted:#71717a; --accent:#22d3ee; --green:#4ade80; --red:#f87171; --yellow:#facc15; }
        :root[data-theme="light"] { color-scheme: light; --bg:#f6f8fb; --card:#fff; --border:#d8dee9; --text:#1f2937; --muted:#6b7280; --accent:#0891b2; --green:#16a34a; --red:#dc2626; --yellow:#ca8a04; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { height:100vh; height:100dvh; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; flex-direction:column; overflow:hidden; }
        .icon { width:1em; height:1em; vertical-align:-0.16em; flex-shrink:0; }
        .icon-inline { display:inline-flex; align-items:center; gap:6px; }
        .theme-toggle { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:var(--card); color:var(--muted); border-radius:7px; padding:4px 8px; cursor:pointer; font-size:.78rem; }
        .toolbar { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0; }
        .logo { font-size:.9rem; font-weight:700; color:var(--accent); white-space:nowrap; }
        .spacer { flex:1; }
        .nav { display:flex; gap:6px; }
        .nav a { color:var(--muted); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:.78rem; text-decoration:none; }
        .nav a:hover { color:var(--accent); border-color:var(--accent); }
        .lang-switch { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:.78rem; }
        .controls { display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--card); border-bottom:1px solid var(--border); flex-wrap:wrap; }
        .controls select, .controls input { border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); padding:7px 10px; font-size:.9rem; outline:none; }
        .controls input { min-width:180px; }
        .controls input.small { min-width:64px; width:86px; }
        .settings { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--card); border-bottom:1px solid var(--border); flex-wrap:wrap; color:var(--muted); font-size:.82rem; }
        .settings label { display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
        .settings select, .settings input { border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); padding:5px 8px; font-size:.82rem; outline:none; }
        .settings input { width:72px; }
        .manual-settings[data-disabled="true"] { opacity:.45; pointer-events:none; }
        .btn { border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); padding:7px 12px; cursor:pointer; }
        .btn:hover { border-color:var(--accent); color:var(--accent); }
        .status { color:var(--muted); font-size:.86rem; }
        .status.ok { color:var(--green); }
        .status.warn { color:var(--yellow); }
        .status.err { color:var(--red); }
        .stage { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:12px; overflow:auto; }
        canvas { max-width:100%; max-height:100%; background:#000; border:1px solid var(--border); border-radius:10px; image-rendering:auto; }
        .empty { color:var(--muted); text-align:center; line-height:1.8; }
        @media (max-width:720px) { .toolbar { flex-wrap:wrap; } .nav { width:100%; overflow-x:auto; } .controls > * { flex:1 1 auto; } }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="logo">RDev <span data-i18n="nav.desktop">Desktop</span></div>
        <div class="spacer"></div>
        <div id="lang-slot"></div>
        <div class="nav">
            <a href="/" data-auth-link data-i18n="nav.dashboard">Dashboard</a>
            <a href="/terminal.html" data-auth-link data-i18n="nav.terminal">Terminal</a>
            <a href="/files.html" data-auth-link data-i18n="nav.files">Files</a>
            <a href="/sessions.html" data-auth-link data-i18n="nav.sessions">Sessions</a>
            <a href="/desktop.html" data-auth-link data-i18n="nav.desktop">Desktop</a>
        </div>
    </div>
    <div class="controls">
        <select id="device"><option value="" data-i18n="terminal.devicePlaceholder">-- device --</option></select>
        <input id="password" type="password" data-i18n-placeholder="terminal.passwordPlaceholder" placeholder="输入密码">
        <button class="btn" id="connect" data-i18n="common.connect">连接</button>
        <button class="btn" id="disconnect" data-i18n="desktop.disconnect">断开</button>
        <span id="status" class="status" data-i18n="desktop.idle">Idle</span>
    </div>
    <div class="settings">
        <label><span data-i18n="desktop.mode">Mode</span><select id="mode"><option value="auto" data-i18n="desktop.modeAuto">Auto</option><option value="manual" data-i18n="desktop.modeManual">Manual</option></select></label>
        <label><span data-i18n="desktop.source">Source</span><select id="source"><option value="auto" data-i18n="desktop.sourceAuto">Auto</option><option value="virtual" data-i18n="desktop.sourceVirtual">Virtual screen</option><option value="primary" data-i18n="desktop.sourcePrimary">Primary screen</option></select></label>
        <span class="manual-settings" id="manual-settings">
            <label><span data-i18n="desktop.fps">FPS</span><input id="fps" type="number" min="1" max="12" value="4"></label>
            <label><span data-i18n="desktop.quality">Quality</span><input id="quality" type="number" min="25" max="90" value="50"></label>
            <label><span data-i18n="desktop.maxWidth">Max W</span><input id="maxWidth" type="number" min="320" max="3840" value="1600"></label>
            <label><span data-i18n="desktop.maxHeight">Max H</span><input id="maxHeight" type="number" min="240" max="2160" value="1000"></label>
        </span>
        <span id="frameInfo" class="status"></span>
    </div>
    <div class="stage">
        <canvas id="screen" style="display:none"></canvas>
        <div id="empty" class="empty" data-i18n="desktop.empty">Select a device and connect.</div>
    </div>

    <script src="/i18n.js"></script>
    <script src="/ui.js"></script>
    <script>
    document.getElementById('lang-slot').innerHTML = RDevUI.themeButton() + RDevI18n.langSelector();
    RDevI18n.apply();
    const adminToken = new URLSearchParams(location.search).get('token') || localStorage.getItem('rdevAdminToken') || '';
    if (adminToken) localStorage.setItem('rdevAdminToken', adminToken);
    function authURL(path) { return adminToken ? path + (path.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(adminToken) : path; }
    function authFetch(path, init) { return fetch(authURL(path), init); }
    document.querySelectorAll('[data-auth-link]').forEach(a => a.href = authURL(a.getAttribute('href')));

    const params = new URLSearchParams(location.search);
    const deviceSelect = document.getElementById('device');
    const passwordInput = document.getElementById('password');
    const modeSelect = document.getElementById('mode');
    const sourceSelect = document.getElementById('source');
    const fpsInput = document.getElementById('fps');
    const qualityInput = document.getElementById('quality');
    const maxWidthInput = document.getElementById('maxWidth');
    const maxHeightInput = document.getElementById('maxHeight');
    const manualSettings = document.getElementById('manual-settings');
    const frameInfo = document.getElementById('frameInfo');
    const statusEl = document.getElementById('status');
    const canvas = document.getElementById('screen');
    const ctx = canvas.getContext('2d');
    const empty = document.getElementById('empty');
    let ws = null, drawing = false, pendingFrame = null, deviceCache = [], lastCloseMessage = '';

    function updateSourceOptions() {
        const device = deviceCache.find(d => d.id === deviceSelect.value) || {};
        const sources = (device.desktop && device.desktop.sources && device.desktop.sources.length) ? device.desktop.sources : [
            {id:'auto', label:t('desktop.sourceAuto')},
            {id:'virtual', label:t('desktop.sourceVirtual')},
            {id:'primary', label:t('desktop.sourcePrimary')},
        ];
        const current = sourceSelect.value || 'auto';
        sourceSelect.innerHTML = sources.map(s => `<option value="${esc(s.id)}">${esc(s.label || s.id)}${s.kind ? ' · ' + esc(s.kind) : ''}</option>`).join('');
        sourceSelect.value = sources.some(s => s.id === current) ? current : 'auto';
    }
    function desktopOptions() {
        const manual = modeSelect.value === 'manual';
        return {
            mode: modeSelect.value,
            source: sourceSelect.value,
            fps: manual ? clampInt(fpsInput.value, 1, 12, 4) : 4,
            quality: manual ? clampInt(qualityInput.value, 25, 90, 50) : 50,
            width: manual ? clampInt(maxWidthInput.value, 320, 3840, 1600) : 1600,
            height: manual ? clampInt(maxHeightInput.value, 240, 2160, 1000) : 1000,
        };
    }
    function desktopQuery() {
        const opts = desktopOptions();
        const q = new URLSearchParams({ device: deviceSelect.value, mode: opts.mode, source: opts.source, fps: String(opts.fps), quality: String(opts.quality), width: String(opts.width), height: String(opts.height) });
        return q.toString();
    }
    function authPayload() {
        return Object.assign({ op:'auth', password: passwordInput.value }, desktopOptions());
    }
    function clampInt(value, min, max, fallback) {
        const n = parseInt(value, 10);
        if (!Number.isFinite(n)) return fallback;
        return Math.max(min, Math.min(max, n));
    }
    function updateMode() {
        manualSettings.dataset.disabled = modeSelect.value === 'manual' ? 'false' : 'true';
    }
    function setStatus(text, cls = '') { statusEl.textContent = text; statusEl.className = 'status ' + cls; }
    async function loadDevices() {
        const r = await authFetch('/api/devices');
        const devices = await r.json();
        deviceCache = devices;
        const selected = params.get('device') || deviceSelect.value;
        deviceSelect.innerHTML = '<option value="">' + t('terminal.devicePlaceholder') + '</option>' + devices.map(d => {
            const desktop = d.desktop || {};
            const label = `${d.id} · ${desktop.supported ? t('index.desktopReady') : (desktop.reason || t('index.desktopUnavailable'))}`;
            return `<option value="${esc(d.id)}" ${d.id === selected ? 'selected' : ''}>${esc(label)}</option>`;
        }).join('');
        if (selected) deviceSelect.value = selected;
        updateSourceOptions();
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function disconnect() { if (ws) { ws.close(); ws = null; } lastCloseMessage = ''; setStatus(t('desktop.closed'), 'warn'); }
    async function connect() {
        disconnect();
        const device = deviceSelect.value;
        if (!device) return setStatus(t('common.noDevices'), 'err');
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = RDevUI.socket(`${proto}//${location.host}${authURL('/desktop?' + desktopQuery())}`);
        lastCloseMessage = '';
        ws.binaryType = 'arraybuffer';
        setStatus(t('common.connecting'));
        ws.onmessage = (evt) => {
            if (evt.data instanceof ArrayBuffer) { drawFrame(evt.data); return; }
            const msg = JSON.parse(evt.data);
            if (msg.op === 'auth') {
                setStatus(msg.message || t('desktop.authRequired'), 'warn');
                const saved = RDevUI.getDevicePassword(device);
                if (saved && !passwordInput.value) passwordInput.value = saved;
                if (passwordInput.value) ws.send(JSON.stringify(authPayload()));
            } else if (msg.op === 'auth_ok') {
                if (passwordInput.value) RDevUI.rememberDevicePassword(device, passwordInput.value);
                setStatus(t('desktop.starting'));
            } else if (msg.op === 'auth_fail') {
                RDevUI.forgetDevicePassword(device);
                setStatus(msg.message || t('common.passwordWrong'), 'err');
            } else if (msg.op === 'starting') {
                setStatus(t('desktop.starting'));
            } else if (msg.op === 'ready') {
                canvas.width = msg.width || 1; canvas.height = msg.height || 1;
                canvas.style.display = 'block'; empty.style.display = 'none';
                const source = msg.source ? ` · ${msg.source}` : '';
                frameInfo.textContent = `${canvas.width}×${canvas.height}${source}`;
                setStatus(`${t('index.desktopReady')} · ${canvas.width}×${canvas.height}${source}`, 'ok');
            } else if (msg.op === 'error') {
                lastCloseMessage = msg.message || t('common.error');
                setStatus(lastCloseMessage, 'err');
            } else if (msg.op === 'closed') {
                lastCloseMessage = msg.message || t('desktop.closed');
                setStatus(lastCloseMessage, msg.message ? 'err' : 'warn');
            }
        };
        ws.onclose = () => { ws = null; setStatus(lastCloseMessage || t('desktop.closed'), lastCloseMessage ? 'err' : 'warn'); };
    }
    function drawFrame(data) {
        pendingFrame = data;
        if (drawing) return;
        drawing = true;
        requestAnimationFrame(async () => {
            const frame = pendingFrame; pendingFrame = null;
            try {
                const bitmap = await createImageBitmap(new Blob([frame], {type:'image/jpeg'}));
                if (canvas.width !== bitmap.width || canvas.height !== bitmap.height) { canvas.width = bitmap.width; canvas.height = bitmap.height; }
                canvas.style.display = 'block'; empty.style.display = 'none';
                ctx.drawImage(bitmap, 0, 0);
                bitmap.close && bitmap.close();
            } catch (e) { console.error(e); }
            drawing = false;
            if (pendingFrame) drawFrame(pendingFrame);
        });
    }
    document.getElementById('connect').addEventListener('click', connect);
    document.getElementById('disconnect').addEventListener('click', disconnect);
    deviceSelect.addEventListener('change', updateSourceOptions);
    modeSelect.addEventListener('change', updateMode);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
    window.addEventListener('beforeunload', disconnect);
    updateMode();
    loadDevices().then(() => { if (deviceSelect.value) connect(); }).catch(e => setStatus(e.message || String(e), 'err'));
    </script>
</body>
</html>
