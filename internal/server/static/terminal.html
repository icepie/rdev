<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDev Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #22d3ee;
            --green: #4ade80;
            --red: #f87171;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        .toolbar { display: flex; align-items: center; padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
        .toolbar .logo { font-size: 0.9rem; font-weight: 600; color: var(--accent); }
        .toolbar .logo span { color: var(--muted); font-weight: 400; }
        .device-select { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.85rem; outline: none; cursor: pointer; min-width: 150px; }
        .device-select:focus { border-color: var(--accent); }
        .device-select option { background: var(--bg); color: var(--text); }
        .status { font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .status .dot { width: 7px; height: 7px; border-radius: 50%; }
        .status.connected .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .status.disconnected .dot { background: var(--red); }
        .status.connecting .dot { background: var(--yellow); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .connect-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
        .connect-btn:hover { border-color: var(--accent); color: var(--accent); }
        .connect-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .spacer { flex: 1; }
        .back-link { color: var(--muted); text-decoration: none; font-size: 0.8rem; transition: color 0.15s; }
        .back-link:hover { color: var(--accent); }
        #terminal-container { flex: 1; padding: 8px; overflow: hidden; }
        .xterm { height: 100%; }
        .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(15,17,23,0.85); z-index: 10; }
        .overlay .msg { text-align: center; }
        .overlay .msg h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .overlay .msg p { color: var(--muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="logo">RDev <span>Terminal</span></div>
        <select id="device-select" class="device-select">
            <option value="">-- 选择设备 --</option>
        </select>
        <button id="connect-btn" class="connect-btn" disabled>连接</button>
        <div id="status" class="status disconnected"><div class="dot"></div><span>未连接</span></div>
        <div class="spacer"></div>
        <a href="/" class="back-link">← 返回</a>
    </div>
    <div id="terminal-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <script>
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: "'SF Mono','Fira Code','Cascadia Code',Menlo,Monaco,monospace",
            theme: {
                background: '#0f1117',
                foreground: '#e4e4e7',
                cursor: '#22d3ee',
                cursorAccent: '#0f1117',
                selectionBackground: 'rgba(34,211,238,0.25)',
                black: '#1a1d27', red: '#f87171', green: '#4ade80', yellow: '#facc15',
                blue: '#60a5fa', magenta: '#c084fc', cyan: '#22d3ee', white: '#e4e4e7',
                brightBlack: '#3f3f46', brightRed: '#fca5a5', brightGreen: '#86efac',
                brightYellow: '#fde68a', brightBlue: '#93c5fd', brightMagenta: '#d8b4fe',
                brightCyan: '#67e8f9', brightWhite: '#f4f4f5',
            },
            allowProposedApi: true,
        });
        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);
        term.open(document.getElementById('terminal-container'));

        let ws = null;
        let resizeTimeout = null;

        function toBase64(buf) {
            const bytes = new Uint8Array(buf);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        function fromBase64(str) {
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes;
        }

        // Parse query params
        const params = new URLSearchParams(location.search);
        const preselectDevice = params.get('device');

        // Load device list
        async function loadDevices() {
            try {
                const r = await fetch('/api/devices');
                const devices = await r.json();
                const sel = document.getElementById('device-select');
                sel.innerHTML = '<option value="">-- 选择设备 --</option>';
                devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.id + (d.hasPassword ? ' 🔒' : ' 🔑');
                    sel.appendChild(opt);
                });
                if (preselectDevice) {
                    sel.value = preselectDevice;
                    document.getElementById('connect-btn').disabled = false;
                }
            } catch(e) {}
        }
        loadDevices();
        setInterval(loadDevices, 5000);

        document.getElementById('device-select').addEventListener('change', function() {
            document.getElementById('connect-btn').disabled = !this.value;
        });

        function setStatus(state, text) {
            const el = document.getElementById('status');
            el.className = 'status ' + state;
            el.querySelector('span').textContent = text;
        }

        function connect() {
            const deviceID = document.getElementById('device-select').value;
            if (!deviceID) return;
            if (ws) { ws.close(); ws = null; }

            setStatus('connecting', '连接中...');
            term.reset();

            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/terminal?device=${encodeURIComponent(deviceID)}`);

            ws.onopen = function() {
                setStatus('connected', '已连接: ' + deviceID);
                term.focus();
                // Initial resize
                fitAddon.fit();
                doResize();
            };

            ws.onmessage = function(evt) {
                const msg = JSON.parse(evt.data);
                switch(msg.op) {
                    case 'output':
                        const data = fromBase64(msg.data);
                        term.write(data);
                        break;
                    case 'exit':
                        term.write('\r\n\x1b[33m[Process exited with code ' + msg.code + ']\x1b[0m\r\n');
                        setStatus('disconnected', '已退出 (code ' + msg.code + ')');
                        ws.close();
                        ws = null;
                        break;
                    case 'error':
                        term.write('\r\n\x1b[31m[Error: ' + msg.message + ']\x1b[0m\r\n');
                        setStatus('disconnected', '错误');
                        break;
                }
            };

            ws.onclose = function() {
                if (ws) {
                    setStatus('disconnected', '连接断开');
                    ws = null;
                }
            };

            ws.onerror = function() {
                setStatus('disconnected', '连接失败');
            };

            // Terminal input → server
            term.onData(function(data) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ op: 'input', data: toBase64(new TextEncoder().encode(data)) }));
                }
            });

            // Resize handler
            term.onResize(function({ cols, rows }) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ op: 'resize', rows: rows, cols: cols }));
                }
            });
        }

        function doResize() {
            try { fitAddon.fit(); } catch(e) {}
        }

        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(doResize, 100);
        });

        document.getElementById('connect-btn').addEventListener('click', connect);

        // Auto-connect if device preselected
        if (preselectDevice) {
            setTimeout(connect, 500);
        }

        // Initial fit
        setTimeout(doResize, 100);
    </script>
</body>
</html>
