<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/boot.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.terminal">RDev Terminal</title>
    <link rel="stylesheet" href="/vendor/xterm.css">
    <style>
        :root { color-scheme: dark; }
        :root[data-theme="dark"] {
            --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
            --text: #e4e4e7; --muted: #71717a; --accent: #22d3ee;
            --green: #4ade80; --red: #f87171; --yellow: #facc15;
        }
        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #f6f8fb; --card: #ffffff; --border: #d8dee9;
            --text: #1f2937; --muted: #6b7280; --accent: #0891b2;
            --green: #16a34a; --red: #dc2626; --yellow: #ca8a04;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .icon { width: 1em; height: 1em; vertical-align: -0.16em; flex-shrink: 0; }
        .icon-inline { display:inline-flex; align-items:center; gap:6px; }
        .empty-icon { display:inline-flex; align-items:center; justify-content:center; font-size:3rem; margin-bottom:1rem; opacity:.32; color:var(--accent); }
        .theme-toggle { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:var(--card); color:var(--muted); border-radius:7px; padding:4px 8px; cursor:pointer; font-size:0.78rem; }
        .theme-toggle:hover { color:var(--accent); border-color:var(--accent); }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { display: flex; align-items: center; padding: 6px 12px; background: var(--card); border-bottom: 1px solid var(--border); gap: 10px; flex-shrink: 0; }
        .toolbar .logo { font-size: 0.85rem; font-weight: 600; color: var(--accent); white-space: nowrap; }
        .toolbar .logo span { color: var(--muted); font-weight: 400; }
        .device-select { min-width: 150px; max-width: 280px; }
        .new-tab-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.8rem; cursor: pointer; transition: all .15s; white-space: nowrap; }
        .new-tab-btn:hover { border-color: var(--accent); color: var(--accent); }
        .spacer { flex: 1; }
        .gh-link { font-size: 0.85rem; color: var(--muted); text-decoration: none; }
        .gh-link:hover { color: var(--accent); }
        .lang-switch { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:0.78rem; }
        .nav { display: flex; gap: 6px; }
        .nav a { padding: 4px 10px; border-radius: 6px; font-size: 0.78rem; text-decoration: none; border: 1px solid var(--border); color: var(--muted); transition: all .15s; }
        .nav a:hover { color: var(--accent); border-color: var(--accent); }
        .tab-bar { display: flex; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; padding: 0 12px; overflow-x: auto; }
        .tab-item { display: flex; align-items: center; gap: 6px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; border-right: 1px solid var(--border); color: var(--muted); transition: all .1s; white-space: nowrap; position: relative; }
        .tab-item:hover { color: var(--text); background: rgba(255,255,255,0.02); }
        .tab-item.active { color: var(--accent); background: var(--bg); }
        .tab-item.active::after { content:''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
        .tab-close { font-size: 0.7rem; color: var(--muted); cursor: pointer; padding: 2px; border-radius: 3px; line-height: 1; }
        .tab-close:hover { color: var(--red); background: rgba(248,113,113,0.1); }
        .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .tab-dot.connected { background: var(--green); }
        .tab-dot.disconnected { background: var(--red); }
        .tab-dot.authing { background: var(--yellow); }
        .terminal-panes { flex: 1; position: relative; overflow: hidden; min-height: 0; }
        .terminal-pane { position: absolute; inset: 0; padding: 4px; visibility: hidden; pointer-events: none; touch-action: manipulation; }
        .terminal-pane.active { visibility: visible; pointer-events: auto; }
        .terminal-pane > .xterm { width: 100%; height: 100%; }
        .terminal-pane .xterm-screen, .terminal-pane .xterm-viewport { box-sizing: content-box; }
        .terminal-pane .xterm-screen canvas { display: block; }
        .mobile-keys { display: none; flex-shrink: 0; gap: 6px; padding: 6px 8px; background: var(--card); border-top: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .mobile-keys button { min-width: 44px; min-height: 34px; padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.8rem; }

        /* ── Auth overlay ── */
        .auth-overlay { position: absolute; inset: 0; background: rgba(15,17,23,0.92); display: flex; align-items: center; justify-content: center; z-index: 10; }
        .auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 340px; text-align: center; }
        .auth-box h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--accent); }
        .auth-box p { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.2rem; }
        .auth-box input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; outline: none; margin-bottom: 0.8rem; }
        .auth-box input:focus { border-color: var(--accent); }
        .auth-box .auth-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--accent); color: var(--bg); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
        .auth-box .auth-btn:hover { opacity: 0.85; }
        .auth-box .auth-err { color: var(--red); font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2em; }
        @media (max-width: 720px) {
            .toolbar { flex-wrap: wrap; gap: 6px; padding: 6px 8px; }
            .toolbar .logo { width: 100%; }
            .device-select { flex: 1; min-width: 0; max-width: none; }
            .new-tab-btn { padding: 5px 10px; }
            .gh-link { display: none; }
            .nav { width: 100%; overflow-x: auto; padding-bottom: 2px; }
            .nav a { flex: 0 0 auto; padding: 5px 9px; }
            .tab-bar { padding: 0 6px; }
            .tab-item { padding: 7px 10px; }
            .auth-box { width: min(92vw, 340px); padding: 1.25rem; }
            .mobile-keys { display: flex; }
            .terminal-pane { padding: 2px; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="logo">RDev <span data-i18n="nav.terminal">Terminal</span></div>
        <div id="device-select" class="device-select"></div>
        <button class="new-tab-btn" id="new-tab-btn" data-i18n="terminal.newTab">+ New Tab</button>
        <div class="spacer"></div>
        <a class="gh-link" href="https://github.com/icepie/rdev" target="_blank" title="GitHub"><span class="icon-inline"><span data-icon="github"></span>GitHub</span></a>
        <div id="lang-slot"></div>
        <div class="nav">
            <a href="/" data-auth-link data-i18n="nav.dashboard">Dashboard</a>
            <a href="/sessions" data-auth-link data-i18n="nav.sessions">Sessions</a>
            <a href="/batch" data-auth-link data-i18n="nav.batch">Batch</a>
            <a href="/files" data-auth-link data-i18n="nav.files">Files</a>
        </div>
    </div>
    <div class="tab-bar" id="tab-bar"></div>
    <div class="terminal-panes" id="terminal-panes"></div>
    <div class="mobile-keys" id="mobile-keys">
        <button data-key="\u001b">Esc</button><button data-key="\t">Tab</button><button data-key="\u0003">Ctrl+C</button><button data-key="\u0004">Ctrl+D</button>
        <button data-key="\u001b[A">↑</button><button data-key="\u001b[B">↓</button><button data-key="\u001b[D">←</button><button data-key="\u001b[C">→</button><button data-key="\r">Enter</button>
    </div>

    <script src="/i18n.js"></script>
    <script src="/ui.js"></script>
    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/xterm-addon-fit.js"></script>
    <script src="/vendor/xterm-addon-web-links.js"></script>
    <script src="/vendor/addon-image.js"></script>
    <script src="/terminal-images.js"></script>
    <script src="/vendor/addon-webgl.js"></script>
    <script>

    document.getElementById('lang-slot').innerHTML = RDevUI.themeButton() + RDevI18n.langSelector();
    RDevI18n.apply();
    document.querySelectorAll('[data-icon]').forEach(el => { el.innerHTML = icon(el.dataset.icon); });
    window.addEventListener('rdev:langchange', () => { if (typeof renderDevices === 'function') renderDevices(); if (typeof renderList === 'function') renderList(); });

    const adminToken = new URLSearchParams(location.search).get('token') || localStorage.getItem('rdevAdminToken') || '';
    if (adminToken) localStorage.setItem('rdevAdminToken', adminToken);
    function authURL(path) { return adminToken ? path + (path.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(adminToken) : path; }
    async function authFetch(path, init) {
        const r = await fetch(authURL(path), init);
        if (r.status === 401) {
            const token = await RDevUI.prompt({ title: t('common.adminTokenRequired'), message: t('common.adminTokenRequired'), type: 'password' });
            if (token) { localStorage.setItem('rdevAdminToken', token); location.search = 'token=' + encodeURIComponent(token); }
        }
        return r;
    }
    const FitAddon = window.FitAddon;
    const WebLinksAddon = window.WebLinksAddon;
    const WebglAddon = window.AddonWebgl?.WebglAddon;
    const enableTerminalWebgl = localStorage.getItem('rdevTerminal.webgl') === 'true';

    document.querySelectorAll('[data-auth-link]').forEach(a => a.href = authURL(a.getAttribute('href')));

    let tabs = [], activeTabId = null, tabCounter = 0;
    const terminalInputEncoder = new TextEncoder();
    RDevUI.setSelectOptions(document.getElementById('device-select'), [{ value: '', label: t('terminal.devicePlaceholder') }], '');
    function activeTab() { return tabs.find(t => t.id === activeTabId); }
    function sendTerminalData(tab, data) {
        if (tab && tab.ws && tab.ws.readyState === WebSocket.OPEN && !tab.needAuth) {
            tab.ws.send(terminalInputEncoder.encode(data));
        }
    }
    function prepareTerminalInput(tab) {
        const textarea = document.querySelector(`#pane-${tab.id} textarea`);
        if (!textarea) return;
        textarea.setAttribute('inputmode', 'text');
        textarea.setAttribute('enterkeyhint', 'enter');
        textarea.setAttribute('autocapitalize', 'off');
        textarea.setAttribute('autocomplete', 'off');
        textarea.setAttribute('autocorrect', 'off');
        textarea.setAttribute('spellcheck', 'false');
        textarea.addEventListener('compositionend', () => setTimeout(() => doResize(tab), 30));
        textarea.addEventListener('focus', () => setTimeout(() => doResize(tab), 80));
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function loadTerminalImageAddon(term) {
        if (!window.ImageAddon || !window.ImageAddon.ImageAddon) return null;
        try {
            const addon = new window.ImageAddon.ImageAddon({
                sixelSupport: true,
                iipSupport: true,
                sixelScrolling: true,
                pixelLimit: 8192 * 8192,
                sixelSizeLimit: 16 * 1024 * 1024,
                iipSizeLimit: 16 * 1024 * 1024,
                storageLimit: 64,
                showPlaceholder: false,
            });
            term.loadAddon(addon);
            return addon;
        } catch(e) {
            console.warn('RDev image addon disabled:', e);
            return null;
        }
    }

    function createTab(deviceID) {
        const id = ++tabCounter;
        const term = new Terminal({
            cursorBlink: true, fontSize: 14,
            convertEol: true,
            fontFamily: "'SF Mono','Fira Code','Cascadia Code',Menlo,Monaco,monospace",
            lineHeight: 1.12,
            letterSpacing: 0,
            theme: {
                background: '#0f1117', foreground: '#e4e4e7',
                cursor: '#22d3ee', cursorAccent: '#0f1117',
                selectionBackground: 'rgba(34,211,238,0.25)',
                black: '#1a1d27', red: '#f87171', green: '#4ade80', yellow: '#facc15',
                blue: '#60a5fa', magenta: '#c084fc', cyan: '#22d3ee', white: '#e4e4e7',
                brightBlack: '#3f3f46', brightRed: '#fca5a5', brightGreen: '#86efac',
                brightYellow: '#fde68a', brightBlue: '#93c5fd', brightMagenta: '#d8b4fe',
                brightCyan: '#67e8f9', brightWhite: '#f4f4f5',
            },
            allowProposedApi: true,
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.loadAddon(new WebLinksAddon.WebLinksAddon());
        const imageAddon = loadTerminalImageAddon(term);

        const pane = document.createElement('div');
        pane.className = 'terminal-pane';
        pane.id = 'pane-' + id;
        document.getElementById('terminal-panes').appendChild(pane);
        term.open(pane);

        // Canvas is the default because it is more stable across font/DPR changes.
        if (enableTerminalWebgl && WebglAddon) {
            try {
                const webgl = new WebglAddon();
                webgl.onContextLoss(() => { webgl.dispose(); });
                term.loadAddon(webgl);
            } catch(e) { /* fallback to canvas is automatic */ }
        }

        refreshTerminalLayout({ term, fitAddon });

        const tab = { id, deviceId: deviceID, ws: null, term, fitAddon, imageAddon, imageWriter: RDevTerminalImages.create(term), decoder: new TextDecoder(), status: 'disconnected', needAuth: false };
        tabs.push(tab);
        prepareTerminalInput(tab);
        connectTab(tab);
        switchTab(id);
        renderTabs();
    }

    function showAuthOverlay(tab) {
        const pane = document.getElementById('pane-' + tab.id);
        // Remove existing overlay
        const old = pane.querySelector('.auth-overlay');
        if (old) old.remove();

        const overlay = document.createElement('div');
        overlay.className = 'auth-overlay';
        overlay.innerHTML = `
            <div class="auth-box">
                <h3 class="icon-inline">${icon('lock')}${t('terminal.authTitle')}</h3>
                <p>${t('terminal.authDesc', {id: esc(tab.deviceId)})}</p>
                <input type="password" id="auth-pw-${tab.id}" placeholder="${t('terminal.passwordPlaceholder')}" autocomplete="current-password" autofocus>
                <button class="auth-btn" id="auth-btn-${tab.id}">${t('common.connect')}</button>
                <div class="auth-err" id="auth-err-${tab.id}"></div>
            </div>`;
        pane.appendChild(overlay);

        const input = document.getElementById('auth-pw-' + tab.id);
        const btn = document.getElementById('auth-btn-' + tab.id);
        const err = document.getElementById('auth-err-' + tab.id);
        const savedPassword = RDevUI.getDevicePassword(tab.deviceId);
        if (savedPassword) input.value = savedPassword;

        const submit = () => {
            const pw = input.value;
            if (!pw) return;
            btn.textContent = t('common.connecting'); btn.disabled = true;
            err.textContent = '';
            if (tab.ws && tab.ws.readyState === WebSocket.OPEN) {
                tab.ws.send(JSON.stringify({ op: 'auth', password: pw }));
            }
        };

        btn.addEventListener('click', submit);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
        setTimeout(() => { input.focus(); if (savedPassword) submit(); }, 50);
    }

    function removeAuthOverlay(tab) {
        const pane = document.getElementById('pane-' + tab.id);
        const overlay = pane?.querySelector('.auth-overlay');
        if (overlay) overlay.remove();
    }

    function hasTerminalImageSequence(data) {
        const bytes = data instanceof Uint8Array ? data : new Uint8Array(data);
        for (let i = 0; i + 2 < bytes.length; i++) {
            if (bytes[i] !== 0x1b) continue;
            if (bytes[i + 1] === 0x50 && bytes[i + 2] === 0x71) return true; // ESC P q (SIXEL)
            if (bytes[i + 1] === 0x5f && bytes[i + 2] === 0x47) return true; // ESC _ G (Kitty)
            if (i + 12 < bytes.length && bytes[i + 1] === 0x5d) {
                const marker = [49, 51, 51, 55, 59, 70, 105, 108, 101, 61]; // 1337;File=
                let ok = true;
                for (let j = 0; j < marker.length; j++) {
                    if (bytes[i + 2 + j] !== marker[j]) { ok = false; break; }
                }
                if (ok) return true;
            }
        }
        return false;
    }

    function handleTerminalBytes(tab, data) {
        removeAuthOverlay(tab);
        if (tab.status !== 'connected') {
            tab.status = 'connected';
            renderTabs();
        }
        if (hasTerminalImageSequence(data) && tab.imageWriter) tab.imageWriter.write(data);
        else tab.term.write(tab.decoder.decode(data, { stream: true }));
    }

    function connectTab(tab) {
        if (tab.ws) { tab.ws.close(); tab.ws = null; }
        tab.decoder = new TextDecoder();
        tab.status = 'connecting'; tab.needAuth = false; tab.term.reset(); renderTabs();

        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const terminalURL = `${proto}//${location.host}${authURL('/terminal?device=' + encodeURIComponent(tab.deviceId))}`;
        tab.ws = RDevUI.socket(terminalURL, { worker: false });
        tab.ws.binaryType = 'arraybuffer';

        tab.ws.onopen = () => {
            tab.status = 'authing'; renderTabs();
        };

        tab.ws.onmessage = (evt) => {
            if (evt.data instanceof ArrayBuffer) {
                handleTerminalBytes(tab, evt.data);
                return;
            }
            if (evt.data instanceof Blob) {
                evt.data.arrayBuffer().then(buf => handleTerminalBytes(tab, buf));
                return;
            }
            // Text = JSON control
            const msg = JSON.parse(evt.data);
            if (msg.op === 'auth') {
                tab.needAuth = true;
                tab.status = 'authing'; renderTabs();
                showAuthOverlay(tab);
            } else if (msg.op === 'auth_ok') {
                const input = document.getElementById('auth-pw-' + tab.id);
                if (input && input.value) RDevUI.rememberDevicePassword(tab.deviceId, input.value);
                removeAuthOverlay(tab);
                tab.needAuth = false;
                tab.status = 'connected'; tab.term.focus(); renderTabs();
                doResize(tab);
            } else if (msg.op === 'auth_fail') {
                RDevUI.forgetDevicePassword(tab.deviceId);
                const err = document.getElementById('auth-err-' + tab.id);
                if (err) err.textContent = msg.message || t('common.passwordWrong');
                const btn = document.getElementById('auth-btn-' + tab.id);
                if (btn) { btn.textContent = t('common.connect'); btn.disabled = false; }
                const input = document.getElementById('auth-pw-' + tab.id);
                if (input) { input.value = ''; input.focus(); }
            } else if (msg.op === 'exit') {
                removeAuthOverlay(tab);
                tab.term.write('\r\n\x1b[33m[' + t('terminal.exitCode', {code: msg.code}) + ']\x1b[0m\r\n');
                tab.status = 'disconnected'; renderTabs();
                tab.ws.close(); tab.ws = null;
            } else if (msg.op === 'error') {
                removeAuthOverlay(tab);
                tab.term.write('\r\n\x1b[31m[' + t('terminal.error', {message: msg.message}) + ']\x1b[0m\r\n');
                tab.status = 'disconnected'; renderTabs();
            }
        };

        tab.ws.onclose = () => {
            removeAuthOverlay(tab);
            if (tab.status !== 'disconnected') {
                tab.status = 'disconnected';
                tab.term.write('\r\n\x1b[31m[' + t('terminal.closed') + ']\x1b[0m\r\n');
                renderTabs();
            }
        };
        tab.ws.onerror = () => { removeAuthOverlay(tab); tab.status = 'disconnected'; renderTabs(); };

        // Only send input when authenticated and connected
        tab.term.onData(data => {
            sendTerminalData(tab, data);
        });


        tab.term.onResize(({ cols, rows }) => {
            if (tab.ws && tab.ws.readyState === WebSocket.OPEN && !tab.needAuth) {
                tab.ws.send(JSON.stringify({ op: 'resize', rows, cols }));
            }
        });
    }

    function refreshTerminalLayout(tab) {
        if (!tab) return;
        const fit = () => {
            try { tab.fitAddon.fit(); } catch(e) {}
            try { tab.term.clearTextureAtlas(); } catch(e) {}
            try { tab.term.refresh(0, Math.max(0, tab.term.rows - 1)); } catch(e) {}
        };
        fit();
        requestAnimationFrame(fit);
    }

    function doResize(tab) {
        const pane = tab ? document.getElementById('pane-' + tab.id) : null;
        if (pane && (pane.clientWidth === 0 || pane.clientHeight === 0)) return;
        refreshTerminalLayout(tab);
    }

    function switchTab(id) {
        activeTabId = id;
        tabs.forEach(t => {
            const pane = document.getElementById('pane-' + t.id);
            if (pane) pane.classList.toggle('active', t.id === id);
            if (t.id === id) { refreshTerminalLayout(t); setTimeout(() => t.term.focus(), 0); }
        });
        renderTabs();
    }

    function closeTab(id) {
        const idx = tabs.findIndex(t => t.id === id);
        if (idx === -1) return;
        const tab = tabs[idx];
        if (tab.ws) tab.ws.close();
        tab.term.dispose();
        const pane = document.getElementById('pane-' + id);
        if (pane) pane.remove();
        tabs.splice(idx, 1);
        if (activeTabId === id) activeTabId = tabs.length ? tabs[Math.min(idx, tabs.length - 1)].id : null;
        switchTab(activeTabId);
    }

    function renderTabs() {
        const bar = document.getElementById('tab-bar');
        bar.innerHTML = tabs.map(t => {
            const active = t.id === activeTabId ? 'active' : '';
            const dotClass = t.status === 'connected' ? 'connected' : t.status === 'authing' ? 'authing' : 'disconnected';
            return `<div class="tab-item ${active}" data-id="${t.id}">
                <span class="tab-dot ${dotClass}"></span>
                <span>${esc(t.deviceId)}</span>
                <span class="tab-close" data-close="${t.id}">${icon('close')}</span>
            </div>`;
        }).join('');
        bar.querySelectorAll('.tab-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('tab-close')) closeTab(parseInt(e.target.dataset.close));
                else switchTab(parseInt(el.dataset.id));
            });
        });
    }

    let devices = [];
    async function loadDevices() {
        try {
            const r = await authFetch('/api/devices'); devices = await r.json();
            const sel = document.getElementById('device-select');
            const cur = sel.value;
            const options = [{ value: '', label: t('terminal.devicePlaceholder') }].concat(devices.map(d => ({ value: d.id, html: esc(d.id) + (d.hasPassword ? icon('lock') : '') })));
            RDevUI.setSelectOptions(sel, options, cur && devices.find(d => d.id === cur) ? cur : '');
        } catch(e) {}
    }

    document.getElementById('new-tab-btn').addEventListener('click', () => {
        const id = document.getElementById('device-select').value;
        if (id) createTab(id);
    });

    document.getElementById('mobile-keys').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-key]');
        if (!btn) return;
        const tab = activeTab();
        sendTerminalData(tab, btn.dataset.key);
        if (tab) { tab.term.focus(); setTimeout(() => doResize(tab), 50); }
    });

    document.getElementById('terminal-panes').addEventListener('pointerdown', () => {
        const tab = activeTab();
        if (tab) tab.term.focus();
    });

    function scheduleActiveResize(delay = 80) {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { const tab = activeTab(); if (tab) doResize(tab); }, delay);
    }

    let resizeTimer;
    window.addEventListener('resize', () => scheduleActiveResize(100));
    if (window.visualViewport) {
        visualViewport.addEventListener('resize', () => scheduleActiveResize(80));
        visualViewport.addEventListener('scroll', () => scheduleActiveResize(80));
    }
    if (document.fonts?.ready) {
        document.fonts.ready.then(() => scheduleActiveResize(0)).catch(() => {});
    }

    const params = new URLSearchParams(location.search);
    const preselect = params.get('device');
    if (preselect) { loadDevices().then(() => { document.getElementById('device-select').value = preselect; createTab(preselect); }); }
    else { loadDevices(); }
    setInterval(loadDevices, 5000);
    </script>
</body>
</html>
