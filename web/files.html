<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/boot.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.files">RDev Files</title>
    <style>
        :root { color-scheme: dark; }
        :root[data-theme="dark"] {
            --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
            --text: #e4e4e7; --muted: #71717a; --accent: #22d3ee;
            --green: #4ade80; --red: #f87171; --yellow: #facc15;
        }
        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #f6f8fb; --card: #ffffff; --border: #d8dee9;
            --text: #1f2937; --muted: #6b7280; --accent: #0891b2;
            --green: #16a34a; --red: #dc2626; --yellow: #ca8a04;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .page { max-width: 1240px; margin: 0 auto; padding: 1.2rem; display: flex; flex-direction: column; gap: 1rem; }
        header { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        h1 { font-size: 1.35rem; color: var(--accent); }
        h1 span { color: var(--text); font-weight: 400; }
        .spacer { flex: 1; }
        .nav { display: flex; gap: 6px; flex-wrap: wrap; }
        .nav a { padding: 5px 10px; border-radius: 7px; border: 1px solid var(--border); color: var(--muted); text-decoration: none; font-size: 0.8rem; }
        .nav a:hover, .nav a.active { color: var(--accent); border-color: var(--accent); }
        .toolbar, .tasks { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem; }
        .toolbar { display: grid; grid-template-columns: minmax(160px, 220px) 1fr auto auto auto; gap: 0.7rem; align-items: center; }
        input { width: 100%; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); padding: 8px 10px; outline: none; font-size: 0.9rem; }
        input:focus { border-color: var(--accent); }
        button { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); padding: 8px 12px; cursor: pointer; font-size: 0.85rem; min-height: 36px; white-space: nowrap; }
        button:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
        button:disabled { opacity: 0.45; cursor: not-allowed; }
        .primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
        .primary:hover:not(:disabled) { color: var(--bg); opacity: 0.9; }
        .drop { border: 2px dashed var(--border); border-radius: 8px; padding: 0.75rem; color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 54px; }
        .drop.drag { border-color: var(--accent); color: var(--accent); background: rgba(34,211,238,0.05); }
        .browser { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; min-height: 42vh; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.65rem 0.8rem; border-bottom: 1px solid var(--border); font-size: 0.86rem; }
        th { color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.04em; }
        tr:last-child td { border-bottom: 0; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .name-btn { color: var(--text); background: transparent; border: 0; padding: 0; min-height: 0; justify-content: flex-start; font-size: 0.88rem; }
        .name-btn:hover { color: var(--accent); }
        .muted { color: var(--muted); }
        .empty { padding: 3rem 1rem; color: var(--muted); text-align: center; }
        .tasks h2 { font-size: 1rem; margin-bottom: 0.7rem; display: flex; align-items: center; gap: 6px; }
        .task-list { display: grid; gap: 0.65rem; }
        .task { border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 0.7rem; align-items: center; }
        .task-main { min-width: 0; }
        .task-title { display: flex; gap: 8px; align-items: center; min-width: 0; }
        .task-title strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .task-meta { color: var(--muted); font-size: 0.76rem; margin-top: 0.25rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .progress { height: 7px; background: var(--bg); border-radius: 999px; overflow: hidden; margin-top: 0.55rem; border: 1px solid var(--border); }
        .progress > div { height: 100%; width: 0; background: var(--accent); transition: width 0.2s linear; }
        .task-stats { color: var(--muted); font-size: 0.76rem; margin-top: 0.35rem; }
        .task-actions { display: flex; gap: 6px; }
        .badge { padding: 2px 7px; border-radius: 6px; font-size: 0.72rem; }
        .running { color: var(--accent); background: rgba(34,211,238,0.12); }
        .completed { color: var(--green); background: rgba(74,222,128,0.12); }
        .failed { color: var(--red); background: rgba(248,113,113,0.12); }
        .paused { color: var(--yellow); background: rgba(250,204,21,0.12); }
        #file-input { display: none; }
        @media (max-width: 820px) {
            .page { padding: 0.8rem; }
            .toolbar { grid-template-columns: 1fr; }
            .browser { overflow-x: auto; }
            table { min-width: 680px; }
            .task { grid-template-columns: 1fr; }
            .task-actions { flex-wrap: wrap; }
            .nav { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <h1>RDev <span data-i18n="files.title">Files</span></h1>
            <div class="spacer"></div>
            <div id="lang-slot"></div>
            <div class="nav">
                <a href="/" data-auth-link data-i18n="nav.dashboard">Dashboard</a>
                <a href="/terminal.html" data-auth-link data-i18n="nav.terminal">Terminal</a>
                <a href="/batch.html" data-auth-link data-i18n="nav.batch">Batch</a>
                <a href="/sessions.html" data-auth-link data-i18n="nav.sessions">Sessions</a>
                <a href="/files.html" data-auth-link class="active" data-i18n="nav.files">Files</a>
            </div>
        </header>

        <section class="toolbar">
            <div id="device-select"></div>
            <input id="path-input" spellcheck="false" autocomplete="off" data-i18n-placeholder="files.path" placeholder="Path">
            <button id="up-btn"><span data-icon="folder"></span><span data-i18n="files.up">Up</span></button>
            <button id="refresh-btn"><span data-icon="refresh"></span><span data-i18n="files.refresh">Refresh</span></button>
            <button id="upload-btn" class="primary"><span data-icon="upload"></span><span data-i18n="files.upload">Upload</span></button>
        </section>

        <div class="drop" id="drop-zone"><span data-icon="upload"></span><span data-i18n="files.dropHint">Drop files here or choose files</span></div>
        <input type="file" id="file-input" multiple>

        <section class="browser">
            <table>
                <thead><tr><th data-i18n="files.name">Name</th><th data-i18n="files.size">Size</th><th data-i18n="files.modified">Modified</th><th data-i18n="files.actions">Actions</th></tr></thead>
                <tbody id="file-list"><tr><td colspan="4" class="empty" data-i18n="files.empty">Select a device to browse files</td></tr></tbody>
            </table>
        </section>

        <section class="tasks">
            <h2><span data-icon="files"></span><span data-i18n="files.tasks">File Tasks</span></h2>
            <div class="task-list" id="task-list"></div>
        </section>
    </div>

    <script src="/i18n.js"></script>
    <script src="/ui.js"></script>
    <script>
    document.getElementById('lang-slot').innerHTML = RDevUI.themeButton() + RDevI18n.langSelector();
    RDevI18n.apply();
    document.querySelectorAll('[data-icon]').forEach(el => { el.innerHTML = icon(el.dataset.icon); });
    window.addEventListener('rdev:langchange', () => { renderTasks(); loadDevices(); RDevI18n.apply(); });

    const adminToken = new URLSearchParams(location.search).get('token') || localStorage.getItem('rdevAdminToken') || '';
    if (adminToken) localStorage.setItem('rdevAdminToken', adminToken);
    function authURL(path) { return adminToken ? path + (path.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(adminToken) : path; }
    async function authFetch(path, init) {
        const r = await fetch(authURL(path), init);
        if (r.status === 401) {
            const token = await RDevUI.prompt({ title: t('common.adminTokenRequired'), message: t('common.adminTokenRequired'), type: 'password' });
            if (token) { localStorage.setItem('rdevAdminToken', token); location.search = 'token=' + encodeURIComponent(token); }
        }
        return r;
    }
    document.querySelectorAll('[data-auth-link]').forEach(a => a.href = authURL(a.getAttribute('href')));

    const CHUNK = 512 * 1024;
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    let ws, devices = [], currentPath = '', parentPath = '', activeDevice = '', authPending = null, authResult = null;
    RDevUI.setSelectOptions(document.getElementById('device-select'), [{ value: '', label: t('terminal.devicePlaceholder') }], '');
    const tasks = new Map(JSON.parse(localStorage.getItem('rdevFileTasks') || '[]').map(t => [t.id, t]));
    const filesByTask = new Map();

    function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
    function id() { return 'task-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2); }
    function saveTasks() { localStorage.setItem('rdevFileTasks', JSON.stringify([...tasks.values()].map(({ chunks, blobParts, file, samples, ...t }) => t))); }
    function fmtBytes(n) {
        if (!Number.isFinite(n)) return '--';
        const u = ['B','KB','MB','GB','TB']; let i = 0, v = n;
        while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
        return (i ? v.toFixed(v < 10 ? 1 : 0) : v.toFixed(0)) + ' ' + u[i];
    }
    function fmtTime(s) { return s ? new Date(s).toLocaleString() : ''; }
    function statusClass(s) { return s === 'completed' ? 'completed' : s === 'failed' ? 'failed' : s === 'paused' ? 'paused' : 'running'; }
    function statusText(s) { return t('files.status.' + s) || s; }
    function updateSpeed(task) {
        const now = Date.now();
        task.samples = (task.samples || []).filter(p => now - p.t < 5000);
        task.samples.push({ t: now, n: task.done || 0 });
        const first = task.samples[0], last = task.samples[task.samples.length - 1];
        task.speed = first && last && last.t > first.t ? Math.max(0, (last.n - first.n) * 1000 / (last.t - first.t)) : 0;
    }
    function renderTasks() {
        const el = document.getElementById('task-list');
        if (!tasks.size) { el.innerHTML = '<div class="muted">' + t('files.noTasks') + '</div>'; return; }
        el.innerHTML = [...tasks.values()].sort((a,b) => b.created - a.created).map(task => {
            const pct = task.size ? Math.min(100, Math.floor((task.done || 0) * 1000 / task.size) / 10) : (task.status === 'completed' ? 100 : 0);
            const eta = task.speed > 0 && task.size ? Math.max(0, (task.size - (task.done || 0)) / task.speed) : 0;
            const stat = `${pct}% · ${fmtBytes(task.done || 0)} / ${fmtBytes(task.size || 0)} · ${fmtBytes(task.speed || 0)}/s` + (eta ? ` · ${Math.ceil(eta)}s` : '');
            return `<div class="task" data-task="${esc(task.id)}">
                <div class="task-main">
                    <div class="task-title"><span class="badge ${statusClass(task.status)}">${esc(statusText(task.status))}</span><strong>${esc(task.name)}</strong><span class="muted">${task.dir === 'upload' ? '↑' : '↓'}</span></div>
                    <div class="task-meta">${esc(task.device)} · ${esc(task.path || task.parentPath || '')}</div>
                    <div class="progress"><div style="width:${pct}%"></div></div>
                    <div class="task-stats">${esc(stat)}${task.message ? ' · ' + esc(task.message) : ''}</div>
                </div>
                <div class="task-actions">
                    <button data-act="pause" ${task.status !== 'running' ? 'disabled' : ''}>${icon('pause')}</button>
                    <button data-act="resume" ${task.status === 'running' || task.status === 'completed' || task.status === 'canceled' ? 'disabled' : ''}>${icon('play')}</button>
                    <button data-act="cancel" ${task.status === 'completed' || task.status === 'canceled' ? 'disabled' : ''}>${icon('close')}</button>
                    <button data-act="clear" ${task.status === 'running' ? 'disabled' : ''}>${t('files.clear')}</button>
                </div>
            </div>`;
        }).join('');
    }
    setInterval(() => { tasks.forEach(t => { if (t.status === 'running') updateSpeed(t); }); renderTasks(); }, 250);

    function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = RDevUI.socket(`${proto}//${location.host}${authURL('/files')}`);
        ws.binaryType = 'arraybuffer';
        ws.onmessage = evt => evt.data instanceof ArrayBuffer ? onBinary(evt.data) : onText(JSON.parse(evt.data));
        ws.onclose = () => setTimeout(connectWS, 1500);
    }
    function send(msg) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg)); }
    function encodeFrame(typ, taskId, offset, payload) {
        const idb = enc.encode(taskId), data = payload ? new Uint8Array(payload) : new Uint8Array(0);
        const buf = new ArrayBuffer(2 + idb.length + 8 + data.length), out = new Uint8Array(buf), view = new DataView(buf);
        out[0] = typ; out[1] = idb.length; out.set(idb, 2); view.setBigUint64(2 + idb.length, BigInt(offset)); out.set(data, 2 + idb.length + 8);
        return buf;
    }
    function decodeFrame(buf) {
        const u = new Uint8Array(buf), len = u[1], taskId = dec.decode(u.slice(2, 2 + len));
        const offset = Number(new DataView(buf).getBigUint64(2 + len));
        return { typ: u[0], taskId, offset, payload: buf.slice(2 + len + 8) };
    }

    async function ensureAuth(deviceId) {
        const dev = devices.find(d => d.id === deviceId);
        if (!dev || !dev.hasPassword) return true;
        const pw = await RDevUI.prompt({ title: t('common.password'), message: t('files.authRequired', { id: deviceId }), type: 'password' });
        if (!pw) return false;
        authPending = deviceId; authResult = null;
        send({ op: 'auth', deviceId, password: pw });
        return new Promise(resolve => {
            const timer = setInterval(() => {
                if (authPending !== deviceId) { clearInterval(timer); resolve(authResult === true); }
            }, 80);
            setTimeout(() => { clearInterval(timer); resolve(false); }, 30000);
        });
    }

    function onText(msg) {
        if (msg.op === 'auth_ok') { authResult = true; authPending = null; return; }
        if (msg.op === 'auth_fail' || msg.op === 'auth_required') { authResult = false; authPending = null; RDevUI.alert({ title: t('common.error'), message: msg.message || t('common.passwordWrong') }); return; }
        if (msg.op === 'list_result') {
            if (msg.error) { renderFiles([], msg.error); return; }
            currentPath = msg.path || currentPath; parentPath = msg.parent || currentPath;
            document.getElementById('path-input').value = currentPath;
            renderFiles(msg.entries || [], msg.truncated ? t('files.truncated') : '');
            return;
        }
        const task = tasks.get(msg.taskId);
        if (msg.op === 'upload_ready' && task) {
            task.path = msg.path; task.done = msg.offset || 0; task.status = 'running'; saveTasks(); uploadLoop(task);
        } else if (msg.op === 'download_start' && task) {
            task.size = msg.size || task.size; task.done = msg.offset || 0; task.name = msg.name || task.name; task.status = 'running'; saveTasks();
        } else if (msg.op === 'transfer_end' && task) {
            task.done = msg.offset || task.size || task.done; task.status = 'completed'; saveTasks(); finishDownload(task);
        } else if ((msg.op === 'transfer_error' || msg.op === 'error') && task) {
            task.status = 'failed'; task.message = msg.message || msg.error || t('common.error'); saveTasks();
        } else if (msg.op === 'canceled' && task) {
            task.status = 'canceled'; saveTasks();
        }
        renderTasks();
    }
    function onBinary(buf) {
        const f = decodeFrame(buf), task = tasks.get(f.taskId);
        if (!task) return;
        if (f.typ === 0x21) {
            task.done = f.offset; updateSpeed(task); saveTasks();
            if (task.waitAck) { const r = task.waitAck; task.waitAck = null; r(); }
        } else if (f.typ === 0x22) {
            if (f.offset === (task.done || 0)) {
                task.blobParts = task.blobParts || [];
                task.blobParts.push(f.payload);
                task.done = f.offset + f.payload.byteLength;
                updateSpeed(task); saveTasks();
            }
        } else if (f.typ === 0x23) {
            task.done = f.offset || task.done; task.status = 'completed'; saveTasks(); finishDownload(task);
        }
    }

    function renderFiles(entries, message) {
        const body = document.getElementById('file-list');
        if (message) body.innerHTML = `<tr><td colspan="4" class="empty">${esc(message)}</td></tr>`;
        else if (!entries.length) body.innerHTML = '<tr><td colspan="4" class="empty">' + t('files.emptyDir') + '</td></tr>';
        else body.innerHTML = entries.map(e => `<tr>
            <td><button class="name-btn" data-path="${esc(e.path)}" data-dir="${e.isDir ? '1' : '0'}">${icon(e.isDir ? 'folder' : 'files')}${esc(e.name)}</button></td>
            <td>${e.isDir ? '--' : esc(fmtBytes(e.size))}</td>
            <td class="muted">${esc(fmtTime(e.modTime))}</td>
            <td>${e.isDir ? '' : `<button data-download="${esc(e.path)}" data-name="${esc(e.name)}" data-size="${e.size}">${icon('download')}${t('files.download')}</button>`}</td>
        </tr>`).join('');
    }
    async function list(path) {
        activeDevice = document.getElementById('device-select').value;
        if (!activeDevice || !(await ensureAuth(activeDevice))) return;
        send({ op: 'list', deviceId: activeDevice, requestId: id(), path });
    }
    async function loadDevices() {
        const r = await authFetch('/api/devices'); devices = await r.json();
        const sel = document.getElementById('device-select'), cur = sel.value;
        const options = [{ value: '', label: t('terminal.devicePlaceholder') }].concat(devices.map(d => ({ value: d.id, html: esc(d.id) + (d.hasPassword ? icon('lock') : '') })));
        RDevUI.setSelectOptions(sel, options, cur && devices.find(d => d.id === cur) ? cur : '');
    }

    function startUpload(file) {
        if (!activeDevice) activeDevice = document.getElementById('device-select').value;
        if (!activeDevice || !file) return;
        const pending = [...tasks.values()].find(t => t.dir === 'upload' && t.status === 'failed' && t.name === file.name && t.size === file.size && !filesByTask.has(t.id));
        if (pending) {
            filesByTask.set(pending.id, file);
            pending.status = 'running';
            pending.message = '';
            saveTasks();
            send({ op: 'upload_start', deviceId: pending.device, taskId: pending.id, parentPath: pending.parentPath, name: pending.name, size: pending.size, modTime: new Date(file.lastModified).toISOString() });
            return;
        }
        const task = { id: id(), dir: 'upload', device: activeDevice, name: file.name, parentPath: currentPath, size: file.size, done: 0, status: 'queued', created: Date.now(), speed: 0 };
        tasks.set(task.id, task); filesByTask.set(task.id, file); saveTasks(); renderTasks();
        send({ op: 'upload_start', deviceId: activeDevice, taskId: task.id, parentPath: currentPath, name: file.name, size: file.size, modTime: new Date(file.lastModified).toISOString() });
    }
    async function uploadLoop(task) {
        const file = filesByTask.get(task.id);
        if (!file) { task.status = 'failed'; task.message = t('files.reselect'); saveTasks(); return; }
        for (let off = task.done || 0; off < file.size; off = task.done) {
            if (task.status !== 'running') return;
            const chunk = await file.slice(off, off + CHUNK).arrayBuffer();
            ws.send(encodeFrame(0x20, task.id, off, chunk));
            await new Promise(resolve => task.waitAck = resolve);
        }
        send({ op: 'upload_end', taskId: task.id, path: task.path, size: file.size });
    }
    function startDownload(path, name, size) {
        if (!activeDevice) activeDevice = document.getElementById('device-select').value;
        const task = { id: id(), dir: 'download', device: activeDevice, name, path, size: Number(size) || 0, done: 0, status: 'running', created: Date.now(), speed: 0, blobParts: [] };
        tasks.set(task.id, task); saveTasks(); renderTasks();
        send({ op: 'download_start', deviceId: activeDevice, taskId: task.id, path, offset: 0 });
    }
    function finishDownload(task) {
        if (task.dir !== 'download' || !task.blobParts || task.saved) return;
        const blob = new Blob(task.blobParts);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = task.name || 'download'; document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
        task.saved = true;
    }

    document.getElementById('device-select').addEventListener('change', () => { activeDevice = document.getElementById('device-select').value; list(''); });
    document.getElementById('path-input').addEventListener('keydown', e => { if (e.key === 'Enter') list(e.target.value.trim()); });
    document.getElementById('refresh-btn').addEventListener('click', () => list(currentPath));
    document.getElementById('up-btn').addEventListener('click', () => list(parentPath || currentPath));
    document.getElementById('upload-btn').addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('file-input').addEventListener('change', e => [...e.target.files].forEach(startUpload));
    document.getElementById('file-list').addEventListener('click', e => {
        const name = e.target.closest('.name-btn');
        if (name && name.dataset.dir === '1') list(name.dataset.path);
        const dl = e.target.closest('[data-download]');
        if (dl) startDownload(dl.dataset.download, dl.dataset.name, dl.dataset.size);
    });
    document.getElementById('task-list').addEventListener('click', e => {
        const card = e.target.closest('[data-task]'), btn = e.target.closest('[data-act]');
        if (!card || !btn) return;
        const task = tasks.get(card.dataset.task), act = btn.dataset.act;
        if (!task) return;
        if (act === 'pause') { task.status = 'paused'; send({ op: 'cancel', taskId: task.id, offset: task.done || 0 }); }
        if (act === 'resume') {
            task.status = 'running'; task.message = '';
            if (task.dir === 'upload') {
                const file = filesByTask.get(task.id);
                if (!file) { document.getElementById('file-input').click(); task.status = 'failed'; task.message = t('files.reselect'); }
                else send({ op: 'upload_start', deviceId: task.device, taskId: task.id, parentPath: task.parentPath, name: task.name, size: task.size });
            } else {
                task.blobParts = task.blobParts || [];
                send({ op: 'download_start', deviceId: task.device, taskId: task.id, path: task.path, offset: task.done || 0 });
            }
        }
        if (act === 'cancel') { task.status = 'canceled'; send({ op: 'cancel', taskId: task.id, offset: task.done || 0 }); }
        if (act === 'clear') tasks.delete(task.id);
        saveTasks(); renderTasks();
    });
    const drop = document.getElementById('drop-zone');
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag'); [...e.dataTransfer.files].forEach(startUpload); });

    window.addEventListener('rdev:langchange', () => { renderTasks(); });
    connectWS(); loadDevices(); renderTasks(); setInterval(loadDevices, 5000);
    </script>
</body>
</html>
