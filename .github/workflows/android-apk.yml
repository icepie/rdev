name: Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: gradle -p clients/rdev-android --no-daemon assembleDebug

      - name: Stage APK
        run: |
          set -euo pipefail
          mkdir -p dist
          cp clients/rdev-android/app/build/outputs/apk/debug/app-debug.apk dist/rdev-android-apk-debug.apk
          ls -lh dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdev-android-apk-debug
          path: dist/rdev-android-apk-debug.apk
          if-no-files-found: error

  release:
    name: Release APK
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect APK
        run: |
          mkdir -p release
          find artifacts -type f -name '*.apk' -exec cp {} release/ \;
          echo "=== Android APK release files ==="
          ls -lh release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
