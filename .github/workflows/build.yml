name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GO_WIN7_VERSION: 'patched-1.26.4'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: oven-sh/setup-bun@v2

      - name: Build web UI
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build check
        run: |
          CGO_ENABLED=0 go build -o /dev/null ./cmd/rdev-server
          CGO_ENABLED=0 go build -o /dev/null ./cmd/rdev-client

  # ── Standard builds (linux, darwin) ───────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: oven-sh/setup-bun@v2

      - name: Build web UI
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install UPX
        run: |
          curl -fSL --retry 3 -o /tmp/upx.tar.xz \
            "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz"
          tar xf /tmp/upx.tar.xz -C /tmp
          sudo cp /tmp/upx-4.2.4-amd64_linux/upx /usr/local/bin/

      - name: Build & compress server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o rdev-server-raw ./cmd/rdev-server
          upx --best rdev-server-raw -o rdev-server${{ matrix.ext }} || cp rdev-server-raw rdev-server${{ matrix.ext }}

      - name: Build & compress client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o rdev-client-raw ./cmd/rdev-client
          upx --best rdev-client-raw -o rdev-client${{ matrix.ext }} || cp rdev-client-raw rdev-client${{ matrix.ext }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdev-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            rdev-server${{ matrix.ext }}
            rdev-client${{ matrix.ext }}

  # ── Windows build using go-win7 (single job, both archs) ─────
  build-windows:
    name: Build windows (go-win7)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build web UI
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Cache go-win7
        id: cache-go-win7
        uses: actions/cache@v4
        with:
          path: /home/runner/go-win7
          key: go-win7-${{ env.GO_WIN7_VERSION }}

      - name: Download go-win7
        if: steps.cache-go-win7.outputs.cache-hit != 'true'
        run: |
          curl -fSL --retry 5 --retry-delay 10 --connect-timeout 30 --max-time 300 \
            -o go-win7.zip \
            "https://github.com/XTLS/go-win7/releases/download/${GO_WIN7_VERSION}/go-for-win7-linux-amd64.zip"
          mkdir -p /home/runner/go-win7
          unzip -q go-win7.zip -d /home/runner/go-win7
          test -x /home/runner/go-win7/bin/go
          /home/runner/go-win7/bin/go version

      - name: Install UPX
        run: |
          curl -fSL --retry 3 -o /tmp/upx.tar.xz \
            "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz"
          tar xf /tmp/upx.tar.xz -C /tmp
          sudo cp /tmp/upx-4.2.4-amd64_linux/upx /usr/local/bin/

      - name: Build & compress windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
          GOROOT: /home/runner/go-win7
        run: |
          export PATH="/home/runner/go-win7/bin:$PATH"
          go build -ldflags "-s -w" -o rdev-server-raw ./cmd/rdev-server
          upx --best rdev-server-raw -o rdev-server-windows-amd64.exe || cp rdev-server-raw rdev-server-windows-amd64.exe
          go build -ldflags "-s -w" -o rdev-client-raw ./cmd/rdev-client
          upx --best rdev-client-raw -o rdev-client-windows-amd64.exe || cp rdev-client-raw rdev-client-windows-amd64.exe

      - name: Build & compress windows/arm64
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: 0
          GOROOT: /home/runner/go-win7
        run: |
          export PATH="/home/runner/go-win7/bin:$PATH"
          go build -ldflags "-s -w" -o rdev-server-raw ./cmd/rdev-server
          upx --best rdev-server-raw -o rdev-server-windows-arm64.exe || cp rdev-server-raw rdev-server-windows-arm64.exe
          go build -ldflags "-s -w" -o rdev-client-raw ./cmd/rdev-client
          upx --best rdev-client-raw -o rdev-client-windows-arm64.exe || cp rdev-client-raw rdev-client-windows-arm64.exe

      - name: Upload windows/amd64
        uses: actions/upload-artifact@v4
        with:
          name: rdev-windows-amd64
          path: |
            rdev-server-windows-amd64.exe
            rdev-client-windows-amd64.exe

      - name: Upload windows/arm64
        uses: actions/upload-artifact@v4
        with:
          name: rdev-windows-arm64
          path: |
            rdev-server-windows-arm64.exe
            rdev-client-windows-arm64.exe

  # ── Release (only on v* tags) ────────────────────────────────
  release:
    name: Release
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename for release
        run: |
          cd artifacts
          for dir in rdev-*; do
            if [ -d "$dir" ]; then
              os_arch=${dir#rdev-}
              for f in "$dir"/*; do
                base=$(basename "$f")
                name="${base%.*}"
                ext="${base##*.}"
                if [ "$ext" = "$base" ]; then ext=""; else ext=".$ext"; fi
                mv "$f" "${name}-${os_arch}${ext}"
              done
            fi
          done
          rm -rf rdev-*/
          echo "=== Release files ==="
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
