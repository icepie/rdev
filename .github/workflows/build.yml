name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GO_WIN7_VERSION: 'patched-1.26.4'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        run: |
          bun install --frozen-lockfile

      - name: Typecheck web UI
        run: bun run typecheck

      - name: Test web UI
        run: bun run test:web

      - name: Build web UI
        run: |
          bun run build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build check
        run: |
          CGO_ENABLED=0 go build -o /dev/null ./cmd/rdev-server
          CGO_ENABLED=0 go build -o /dev/null ./cmd/rdev-client

  # ── Standard builds (linux, darwin) ───────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: oven-sh/setup-bun@v2

      - name: Build web UI
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install UPX
        run: |
          curl -fSL --retry 3 -o /tmp/upx.tar.xz \
            "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz"
          tar xf /tmp/upx.tar.xz -C /tmp
          sudo cp /tmp/upx-4.2.4-amd64_linux/upx /usr/local/bin/

      - name: Build & compress server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o rdev-server-raw ./cmd/rdev-server
          upx --best rdev-server-raw -o rdev-server${{ matrix.ext }} || cp rdev-server-raw rdev-server${{ matrix.ext }}

      - name: Build & compress client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o rdev-client-raw ./cmd/rdev-client
          upx --best rdev-client-raw -o rdev-client${{ matrix.ext }} || cp rdev-client-raw rdev-client${{ matrix.ext }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdev-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            rdev-server${{ matrix.ext }}
            rdev-client${{ matrix.ext }}

  # ── Android/Termux client builds (Bionic + libc DNS) ─────────
  build-android:
    name: Build android/${{ matrix.name }} client
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm64
            goarch: arm64
            goarm: ''
            cc: aarch64-linux-android24-clang
          - name: armv7
            goarch: arm
            goarm: '7'
            cc: armv7a-linux-androideabi24-clang
          - name: amd64
            goarch: amd64
            goarm: ''
            cc: x86_64-linux-android24-clang
          - name: x86
            goarch: 386
            goarm: ''
            cc: i686-linux-android24-clang
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Build Android client
        env:
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.1.12297006"
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          if [ -n "${{ matrix.goarm }}" ]; then export GOARM="${{ matrix.goarm }}"; fi
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o rdev-client ./cmd/rdev-client
          file rdev-client

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdev-android-${{ matrix.name }}
          path: rdev-client

  # ── Windows build using go-win7 (single job, both archs) ─────
  build-windows:
    name: Build windows (go-win7)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build web UI
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Cache go-win7
        id: cache-go-win7
        uses: actions/cache@v4
        with:
          path: /home/runner/go-win7
          key: go-win7-${{ env.GO_WIN7_VERSION }}

      - name: Download go-win7
        if: steps.cache-go-win7.outputs.cache-hit != 'true'
        run: |
          curl -fSL --retry 5 --retry-delay 10 --connect-timeout 30 --max-time 300 \
            -o go-win7.zip \
            "https://github.com/XTLS/go-win7/releases/download/${GO_WIN7_VERSION}/go-for-win7-linux-amd64.zip"
          mkdir -p /home/runner/go-win7
          unzip -q go-win7.zip -d /home/runner/go-win7
          test -x /home/runner/go-win7/bin/go
          /home/runner/go-win7/bin/go version

      - name: Install UPX
        run: |
          curl -fSL --retry 3 -o /tmp/upx.tar.xz \
            "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz"
          tar xf /tmp/upx.tar.xz -C /tmp
          sudo cp /tmp/upx-4.2.4-amd64_linux/upx /usr/local/bin/

      - name: Build & compress windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
          GOROOT: /home/runner/go-win7
        run: |
          export PATH="/home/runner/go-win7/bin:$PATH"
          mkdir -p dist/windows-amd64
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o rdev-server-raw ./cmd/rdev-server
          upx --best rdev-server-raw -o dist/windows-amd64/rdev-server.exe || cp rdev-server-raw dist/windows-amd64/rdev-server.exe
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o rdev-client-raw ./cmd/rdev-client
          upx --best rdev-client-raw -o dist/windows-amd64/rdev-client.exe || cp rdev-client-raw dist/windows-amd64/rdev-client.exe

      - name: Build & compress windows/arm64
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: 0
          GOROOT: /home/runner/go-win7
        run: |
          export PATH="/home/runner/go-win7/bin:$PATH"
          mkdir -p dist/windows-arm64
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o rdev-server-raw ./cmd/rdev-server
          upx --best rdev-server-raw -o dist/windows-arm64/rdev-server.exe || cp rdev-server-raw dist/windows-arm64/rdev-server.exe
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o rdev-client-raw ./cmd/rdev-client
          upx --best rdev-client-raw -o dist/windows-arm64/rdev-client.exe || cp rdev-client-raw dist/windows-arm64/rdev-client.exe

      - name: Upload windows/amd64
        uses: actions/upload-artifact@v4
        with:
          name: rdev-windows-amd64
          path: |
            dist/windows-amd64/rdev-server.exe
            dist/windows-amd64/rdev-client.exe

      - name: Upload windows/arm64
        uses: actions/upload-artifact@v4
        with:
          name: rdev-windows-arm64
          path: |
            dist/windows-arm64/rdev-server.exe
            dist/windows-arm64/rdev-client.exe

  # ── Release (only on v* tags) ────────────────────────────────
  release:
    name: Release
    needs: [build, build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename for release
        run: |
          cd artifacts
          for dir in rdev-*; do
            if [ -d "$dir" ]; then
              os_arch=${dir#rdev-}
              for f in "$dir"/*; do
                base=$(basename "$f")
                name="${base%.*}"
                ext="${base##*.}"
                if [ "$ext" = "$base" ]; then ext=""; else ext=".$ext"; fi
                mv "$f" "${name}-${os_arch}${ext}"
              done
            fi
          done
          rm -rf rdev-*/
          echo "=== Release files ==="
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
