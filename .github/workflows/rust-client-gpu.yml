name: Rust Client GPU

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rust-client-gpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/rdev-client-gpu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/rdev-client-gpu -> target

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Smoke test
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync
          make rust-client-gpu-smoke

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-linux-amd64
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-linux-arm64
          - name: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rdev-client-gpu.exe
            asset: rdev-client-gpu-windows-amd64
          - name: windows-win7-amd64
            os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            artifact: rdev-client-gpu.exe
            asset: rdev-client-gpu-windows-win7-amd64
          - name: darwin-amd64
            os: macos-13
            target: x86_64-apple-darwin
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-darwin-amd64
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-darwin-arm64
    defaults:
      run:
        working-directory: clients/rdev-client-gpu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Windows GNU linker
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install Linux arm64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/rdev-client-gpu -> target
          key: ${{ matrix.target }}

      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.asset }}"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            python3 win7/patch_imports.py \
              "target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
              "dist/${{ matrix.asset }}/rdev-client-gpu.exe"
            python3 win7/build_shims.py "dist/${{ matrix.asset }}"
            python3 win7/copy_winpty_runtime.py "dist/${{ matrix.asset }}"
            (cd dist && python3 -m zipfile -c "${{ matrix.asset }}.zip" "${{ matrix.asset }}")
          elif [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.asset }}/rdev-client-gpu.exe"
            (cd dist && python3 -m zipfile -c "${{ matrix.asset }}.zip" "${{ matrix.asset }}")
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.asset }}/rdev-client-gpu"
            chmod +x "dist/${{ matrix.asset }}/rdev-client-gpu"
            tar -C dist -czf "dist/${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            clients/rdev-client-gpu/dist/${{ matrix.asset }}.tar.gz
            clients/rdev-client-gpu/dist/${{ matrix.asset }}.zip
          if-no-files-found: error

  package-linux-desktop:
    name: Package Linux desktop ${{ matrix.name }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: glibc2.17-amd64
            image: quay.io/pypa/manylinux2014_x86_64
            distro: manylinux2014
            target: x86_64-unknown-linux-gnu
            arch: amd64
            asset: rdev-client-gpu-linux-amd64-glibc2.17-desktop
          - name: glibc2.28-amd64
            image: rockylinux:8
            distro: rocky8
            target: x86_64-unknown-linux-gnu
            arch: amd64
            asset: rdev-client-gpu-linux-amd64-glibc2.28-desktop
          - name: ubuntu20.04-amd64
            image: ubuntu:20.04
            distro: ubuntu2004
            target: x86_64-unknown-linux-gnu
            arch: amd64
            asset: rdev-client-gpu-linux-amd64-glibc2.31-desktop
          - name: ubuntu22.04-amd64
            image: ubuntu:22.04
            distro: ubuntu2204
            target: x86_64-unknown-linux-gnu
            arch: amd64
            asset: rdev-client-gpu-linux-amd64-glibc2.35-desktop
          - name: ubuntu24.04-amd64
            image: ubuntu:24.04
            distro: ubuntu2404
            target: x86_64-unknown-linux-gnu
            arch: amd64
            asset: rdev-client-gpu-linux-amd64-glibc2.39-desktop
          - name: debian11-amd64
            image: debian:11
            distro: debian11
            target: x86_64-unknown-linux-gnu
            arch: amd64
            asset: rdev-client-gpu-linux-amd64-debian11-desktop
          - name: debian12-amd64
            image: debian:12
            distro: debian12
            target: x86_64-unknown-linux-gnu
            arch: amd64
            asset: rdev-client-gpu-linux-amd64-debian12-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Build in distro container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e CARGO_NET_RETRY=5 \
            -e RDEV_GPU_PROXY='${{ vars.RDEV_GPU_PROXY }}' \
            -e RDEV_GPU_APT_MIRROR='${{ vars.RDEV_GPU_APT_MIRROR }}' \
            -e RDEV_GPU_CARGO_REGISTRY='${{ vars.RDEV_GPU_CARGO_REGISTRY }}' \
            -e RDEV_GPU_RUSTUP_DIST_SERVER='${{ vars.RDEV_GPU_RUSTUP_DIST_SERVER }}' \
            -e RDEV_GPU_RUSTUP_UPDATE_ROOT='${{ vars.RDEV_GPU_RUSTUP_UPDATE_ROOT }}' \
            -e RDEV_GPU_TARGET='${{ matrix.target }}' \
            -e RDEV_GPU_ARCH='${{ matrix.arch }}' \
            -e RDEV_GPU_ASSET='${{ matrix.asset }}' \
            -e RDEV_GPU_RUST_TOOLCHAIN='stable' \
            -e TMPDIR=/tmp \
            '${{ matrix.image }}' \
            bash clients/rdev-client-gpu/scripts/package-linux-desktop.sh '${{ matrix.distro }}'

      - name: Pack artifact
        run: |
          tar -C clients/rdev-client-gpu/dist -czf \
            clients/rdev-client-gpu/dist/${{ matrix.asset }}.tar.gz \
            ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: clients/rdev-client-gpu/dist/${{ matrix.asset }}.tar.gz

  package-macos-desktop:
    name: Package macOS desktop ${{ matrix.name }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64
            os: macos-13
            target: x86_64-apple-darwin
            asset: rdev-client-gpu-darwin-amd64-desktop
            deployment_target: '10.13'
          - name: arm64
            os: macos-14
            target: aarch64-apple-darwin
            asset: rdev-client-gpu-darwin-arm64-desktop
            deployment_target: '11.0'
    defaults:
      run:
        working-directory: clients/rdev-client-gpu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        run: brew install nasm yasm pkg-config

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/rdev-client-gpu -> target
          key: desktop-${{ matrix.target }}

      - name: Build embedded desktop release
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: cargo build --release --features embedded-rdev-desktop --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir -p "dist/${{ matrix.asset }}"
          cp "target/${{ matrix.target }}/release/rdev-client-gpu" "dist/${{ matrix.asset }}/rdev-client-gpu"
          chmod +x "dist/${{ matrix.asset }}/rdev-client-gpu"
          "dist/${{ matrix.asset }}/rdev-client-gpu" --version > "dist/${{ matrix.asset }}/VERSION.txt"
          otool -L "dist/${{ matrix.asset }}/rdev-client-gpu" > "dist/${{ matrix.asset }}/BUILD_INFO.txt" || true
          tar -C dist -czf "dist/${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: clients/rdev-client-gpu/dist/${{ matrix.asset }}.tar.gz

  release:
    name: Release Rust GPU client
    needs: [build, package-linux-desktop, package-macos-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          echo "=== Rust GPU release files ==="
          ls -lh release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
