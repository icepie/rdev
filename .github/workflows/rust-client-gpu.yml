name: Rust Client GPU

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rust-client-gpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/rdev-client-gpu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/rdev-client-gpu -> target

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Smoke test
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync
          make rust-client-gpu-smoke

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-linux-amd64
            package_linux: true
            distro: ubuntu2204
            arch: amd64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-linux-arm64
            package_linux: true
            distro: ubuntu2204
            arch: arm64
          - name: windows-amd64
            os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            artifact: rdev-client-gpu.exe
            asset: rdev-client-gpu-windows-amd64
          - name: windows-arm64
            os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            artifact: rdev-client-gpu.exe
            asset: rdev-client-gpu-windows-arm64
            llvm_mingw: true
          - name: windows-win7-amd64
            os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            artifact: rdev-client-gpu.exe
            asset: rdev-client-gpu-windows-win7-amd64
            win7: true
          - name: darwin-amd64
            os: macos-14
            target: x86_64-apple-darwin
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-darwin-amd64
            deployment_target: '10.13'
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-darwin-arm64
            deployment_target: '11.0'
    defaults:
      run:
        working-directory: clients/rdev-client-gpu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Windows GNU dependencies
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 nasm yasm pkg-config make python3

      - name: Install Windows ARM64 LLVM MinGW dependencies
        if: matrix.llvm_mingw == true
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm nasm yasm pkg-config make python3 xz-utils
          python3 - <<'PY' > /tmp/llvm-mingw-url
          import json
          import urllib.request

          data = json.load(urllib.request.urlopen("https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest"))
          for asset in data["assets"]:
              name = asset["name"]
              if "ucrt-ubuntu-22.04-x86_64" in name and name.endswith(".tar.xz"):
                  print(asset["browser_download_url"])
                  break
          else:
              raise SystemExit("llvm-mingw ubuntu x86_64 asset not found")
          PY
          curl -fSL --retry 5 --retry-delay 10 -o /tmp/llvm-mingw.tar.xz "$(cat /tmp/llvm-mingw-url)"
          mkdir -p /opt/llvm-mingw
          tar -xf /tmp/llvm-mingw.tar.xz -C /opt/llvm-mingw --strip-components=1
          echo /opt/llvm-mingw/bin >> "$GITHUB_PATH"
          {
            echo 'CC_aarch64_pc_windows_gnullvm=aarch64-w64-mingw32-clang'
            echo 'CXX_aarch64_pc_windows_gnullvm=aarch64-w64-mingw32-clang++'
            echo 'AR_aarch64_pc_windows_gnullvm=llvm-ar'
            echo 'CARGO_TARGET_AARCH64_PC_WINDOWS_GNULLVM_LINKER=aarch64-w64-mingw32-clang'
          } >> "$GITHUB_ENV"

      - name: Install macOS build dependencies
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: brew install nasm yasm pkg-config

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/rdev-client-gpu -> target
          key: desktop-${{ matrix.target }}-${{ matrix.name }}

      - name: Build Linux embedded desktop package
        if: matrix.package_linux == true
        working-directory: .
        env:
          CARGO_NET_RETRY: 5
          RDEV_GPU_PROXY: ${{ vars.RDEV_GPU_PROXY }}
          RDEV_GPU_APT_MIRROR: ${{ vars.RDEV_GPU_APT_MIRROR }}
          RDEV_GPU_CARGO_REGISTRY: ${{ vars.RDEV_GPU_CARGO_REGISTRY }}
          RDEV_GPU_RUSTUP_DIST_SERVER: ${{ vars.RDEV_GPU_RUSTUP_DIST_SERVER }}
          RDEV_GPU_RUSTUP_UPDATE_ROOT: ${{ vars.RDEV_GPU_RUSTUP_UPDATE_ROOT }}
          RDEV_GPU_TARGET: ${{ matrix.target }}
          RDEV_GPU_ARCH: ${{ matrix.arch }}
          RDEV_GPU_ASSET: ${{ matrix.asset }}
          RDEV_GPU_RUST_TOOLCHAIN: stable
          TMPDIR: /tmp
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e CARGO_NET_RETRY \
            -e RDEV_GPU_PROXY \
            -e RDEV_GPU_APT_MIRROR \
            -e RDEV_GPU_CARGO_REGISTRY \
            -e RDEV_GPU_RUSTUP_DIST_SERVER \
            -e RDEV_GPU_RUSTUP_UPDATE_ROOT \
            -e RDEV_GPU_TARGET \
            -e RDEV_GPU_ARCH \
            -e RDEV_GPU_ASSET \
            -e RDEV_GPU_RUST_TOOLCHAIN \
            -e TMPDIR \
            ubuntu:22.04 \
            bash clients/rdev-client-gpu/scripts/package-linux-desktop.sh '${{ matrix.distro }}'

      - name: Build embedded desktop release
        if: matrix.package_linux != true
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: cargo build --release --features embedded-rdev-desktop --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.asset }}"
          if [ "${{ matrix.package_linux }}" = "true" ]; then
            "dist/${{ matrix.asset }}/rdev-client-gpu" --version > "dist/${{ matrix.asset }}/VERSION.txt"
            tar -C dist -czf "dist/${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"
          elif [ "${{ matrix.win7 }}" = "true" ]; then
            python3 win7/patch_imports.py \
              "target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
              "dist/${{ matrix.asset }}/rdev-client-gpu.exe"
            python3 win7/build_shims.py "dist/${{ matrix.asset }}"
            python3 win7/copy_winpty_runtime.py "dist/${{ matrix.asset }}"
            "dist/${{ matrix.asset }}/rdev-client-gpu.exe" --version > "dist/${{ matrix.asset }}/VERSION.txt" || true
            (cd dist && python3 -m zipfile -c "${{ matrix.asset }}.zip" "${{ matrix.asset }}")
          elif [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.asset }}/rdev-client-gpu.exe"
            "dist/${{ matrix.asset }}/rdev-client-gpu.exe" --version > "dist/${{ matrix.asset }}/VERSION.txt" || true
            (cd dist && python3 -m zipfile -c "${{ matrix.asset }}.zip" "${{ matrix.asset }}")
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.asset }}/rdev-client-gpu"
            chmod +x "dist/${{ matrix.asset }}/rdev-client-gpu"
            "dist/${{ matrix.asset }}/rdev-client-gpu" --version > "dist/${{ matrix.asset }}/VERSION.txt"
            if command -v otool >/dev/null 2>&1; then
              otool -L "dist/${{ matrix.asset }}/rdev-client-gpu" > "dist/${{ matrix.asset }}/BUILD_INFO.txt" || true
            fi
            tar -C dist -czf "dist/${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            clients/rdev-client-gpu/dist/${{ matrix.asset }}.tar.gz
            clients/rdev-client-gpu/dist/${{ matrix.asset }}.zip
          if-no-files-found: error

  release:
    name: Release Rust GPU client
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          echo "=== Rust GPU release files ==="
          ls -lh release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
