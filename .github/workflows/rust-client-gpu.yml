name: Rust Client GPU

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rust-client-gpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/rdev-client-gpu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/rdev-client-gpu -> target

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Smoke test
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync
          make rust-client-gpu-smoke

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-linux-amd64
            package_linux: true
            distro: ubuntu2004
            arch: amd64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-linux-arm64
            package_linux: true
            distro: ubuntu2004
            arch: arm64
          - name: windows-amd64
            os: ubuntu-latest
            target: x86_64-pc-windows-gnullvm
            artifact: rdev-client-gpu.exe
            asset: rdev-client-gpu-windows-amd64
            llvm_mingw: msvcrt
          - name: windows-arm64
            os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            artifact: rdev-client-gpu.exe
            asset: rdev-client-gpu-windows-arm64
            llvm_mingw: ucrt
          - name: windows-win7-amd64
            os: ubuntu-latest
            target: x86_64-pc-windows-gnullvm
            artifact: rdev-client-gpu.exe
            asset: rdev-client-gpu-windows-win7-amd64
            llvm_mingw: msvcrt
            win7: true
          - name: darwin-amd64
            os: macos-14
            target: x86_64-apple-darwin
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-darwin-amd64
            deployment_target: '10.13'
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: rdev-client-gpu
            asset: rdev-client-gpu-darwin-arm64
            deployment_target: '11.0'
    defaults:
      run:
        working-directory: clients/rdev-client-gpu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Windows LLVM MinGW dependencies
        if: contains(fromJSON('["msvcrt","ucrt"]'), matrix.llvm_mingw)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm nasm yasm pkg-config make python3 xz-utils
          LLVM_MINGW_VERSION=20260602
          LLVM_MINGW_CRT='${{ matrix.llvm_mingw }}'
          LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/llvm-mingw-${LLVM_MINGW_VERSION}-${LLVM_MINGW_CRT}-ubuntu-22.04-x86_64.tar.xz"
          curl -fSL --retry 5 --retry-delay 10 -o /tmp/llvm-mingw.tar.xz "$LLVM_MINGW_URL"
          mkdir -p /opt/llvm-mingw
          tar -xf /tmp/llvm-mingw.tar.xz -C /opt/llvm-mingw --strip-components=1
          echo /opt/llvm-mingw/bin >> "$GITHUB_PATH"
          if [ '${{ matrix.target }}' = 'x86_64-pc-windows-gnullvm' ]; then
            {
              echo 'CC_x86_64_pc_windows_gnullvm=x86_64-w64-mingw32-clang'
              echo 'CXX_x86_64_pc_windows_gnullvm=x86_64-w64-mingw32-clang++'
              echo 'AR_x86_64_pc_windows_gnullvm=llvm-ar'
              echo 'MINGW_GCC=x86_64-w64-mingw32-clang'
              echo 'RDEV_MINGW_CC=x86_64-w64-mingw32-clang'
              echo 'RDEV_MINGW_CXX=x86_64-w64-mingw32-clang++'
              echo 'RDEV_MINGW_CRT=msvcrt'
              echo 'CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER=x86_64-w64-mingw32-clang'
            } >> "$GITHUB_ENV"
          else
            {
              echo 'CC_aarch64_pc_windows_gnullvm=aarch64-w64-mingw32-clang'
              echo 'CXX_aarch64_pc_windows_gnullvm=aarch64-w64-mingw32-clang++'
              echo 'AR_aarch64_pc_windows_gnullvm=llvm-ar'
              echo 'RDEV_MINGW_CC=aarch64-w64-mingw32-clang'
              echo 'RDEV_MINGW_CXX=aarch64-w64-mingw32-clang++'
              echo 'CARGO_TARGET_AARCH64_PC_WINDOWS_GNULLVM_LINKER=aarch64-w64-mingw32-clang'
            } >> "$GITHUB_ENV"
          fi

      - name: Install macOS build dependencies
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: brew install nasm yasm pkg-config

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/rdev-client-gpu -> target
          key: desktop-${{ matrix.target }}-${{ matrix.name }}

      - name: Build Linux embedded desktop packages
        if: matrix.package_linux == true
        working-directory: .
        env:
          CARGO_NET_RETRY: 5
          RDEV_GPU_PROXY: ${{ vars.RDEV_GPU_PROXY }}
          RDEV_GPU_APT_MIRROR: ${{ vars.RDEV_GPU_APT_MIRROR }}
          RDEV_GPU_CARGO_REGISTRY: ${{ vars.RDEV_GPU_CARGO_REGISTRY }}
          RDEV_GPU_RUSTUP_DIST_SERVER: ${{ vars.RDEV_GPU_RUSTUP_DIST_SERVER }}
          RDEV_GPU_RUSTUP_UPDATE_ROOT: ${{ vars.RDEV_GPU_RUSTUP_UPDATE_ROOT }}
          RDEV_GPU_TARGET: ${{ matrix.target }}
          RDEV_GPU_ARCH: ${{ matrix.arch }}
          RDEV_GPU_RUST_TOOLCHAIN: stable
          TMPDIR: /tmp
        run: |
          set -euo pipefail

          run_linux_package() {
            local distro="$1"
            local image="$2"
            local asset="$3"
            local features="$4"
            local enable_vaapi="$5"
            echo "::group::${asset} (${image})"
            docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              -e CARGO_NET_RETRY \
              -e RDEV_GPU_PROXY \
              -e RDEV_GPU_APT_MIRROR \
              -e RDEV_GPU_CARGO_REGISTRY \
              -e RDEV_GPU_RUSTUP_DIST_SERVER \
              -e RDEV_GPU_RUSTUP_UPDATE_ROOT \
              -e RDEV_GPU_TARGET \
              -e RDEV_GPU_ARCH \
              -e RDEV_GPU_RUST_TOOLCHAIN \
              -e TMPDIR \
              -e RDEV_GPU_ASSET="$asset" \
              -e RDEV_GPU_FEATURES="$features" \
              -e ENABLE_VAAPI="$enable_vaapi" \
              -e ENABLE_NVENC=n \
              "$image" \
              bash clients/rdev-client-gpu/scripts/package-linux-desktop.sh "$distro"
            sudo chown -R "$USER:$USER" clients/rdev-client-gpu/dist
            echo "::endgroup::"
          }

          if [ "${{ matrix.arch }}" = "amd64" ]; then
            run_linux_package archlinux archlinux:latest "${{ matrix.asset }}" embedded-rdev-desktop-vaapi y
          else
            run_linux_package ubuntu2404 ubuntu:24.04 "${{ matrix.asset }}" embedded-rdev-desktop-vaapi y
          fi
          run_linux_package ubuntu2004 ubuntu:20.04 "${{ matrix.asset }}-ubuntu2004" embedded-rdev-desktop n
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            run_linux_package centos7 centos:7 "${{ matrix.asset }}-centos7" embedded-rdev-desktop n
          fi
          run_linux_package centos8 rockylinux:8 "${{ matrix.asset }}-centos8" embedded-rdev-desktop n

      - name: Build embedded desktop release
        if: matrix.package_linux != true
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: cargo build --release --features embedded-rdev-desktop --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ "${{ matrix.package_linux }}" = "true" ]; then
            found=0
            for package_dir in dist/${{ matrix.asset }}*; do
              [ -d "$package_dir" ] || continue
              found=1
              package_name="$(basename "$package_dir")"
              "$package_dir/rdev-client-gpu" --version > "$package_dir/VERSION.txt"
              tar -C dist -czf "dist/${package_name}.tar.gz" "$package_name"
            done
            [ "$found" = "1" ] || { echo "no Linux packages found for ${{ matrix.asset }}" >&2; exit 1; }
          elif [ "${{ matrix.win7 }}" = "true" ]; then
            mkdir -p "dist/${{ matrix.asset }}"
            python3 win7/patch_imports.py \
              "target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
              "dist/${{ matrix.asset }}/rdev-client-gpu.exe"
            python3 win7/build_shims.py "dist/${{ matrix.asset }}"
            python3 win7/copy_winpty_runtime.py "dist/${{ matrix.asset }}"
            case "${{ matrix.target }}" in
              aarch64-*) runtime_arch="aarch64" ;;
              *) runtime_arch="x86_64" ;;
            esac
            runtime_dir="/opt/llvm-mingw/${runtime_arch}-w64-mingw32/bin"
            for dll in libunwind.dll libc++.dll libwinpthread-1.dll; do
              [ -f "$runtime_dir/$dll" ] && cp "$runtime_dir/$dll" "dist/${{ matrix.asset }}/"
            done
            "dist/${{ matrix.asset }}/rdev-client-gpu.exe" --version > "dist/${{ matrix.asset }}/VERSION.txt" || true
            (cd dist && python3 -m zipfile -c "${{ matrix.asset }}.zip" "${{ matrix.asset }}")
          elif [[ "${{ matrix.target }}" == *windows* ]]; then
            mkdir -p "dist/${{ matrix.asset }}"
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.asset }}/rdev-client-gpu.exe"
            case "${{ matrix.target }}" in
              aarch64-*) runtime_arch="aarch64" ;;
              *) runtime_arch="x86_64" ;;
            esac
            runtime_dir="/opt/llvm-mingw/${runtime_arch}-w64-mingw32/bin"
            for dll in libunwind.dll libc++.dll libwinpthread-1.dll; do
              [ -f "$runtime_dir/$dll" ] && cp "$runtime_dir/$dll" "dist/${{ matrix.asset }}/"
            done
            "dist/${{ matrix.asset }}/rdev-client-gpu.exe" --version > "dist/${{ matrix.asset }}/VERSION.txt" || true
            (cd dist && python3 -m zipfile -c "${{ matrix.asset }}.zip" "${{ matrix.asset }}")
          else
            mkdir -p "dist/${{ matrix.asset }}"
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.asset }}/rdev-client-gpu"
            chmod +x "dist/${{ matrix.asset }}/rdev-client-gpu"
            "dist/${{ matrix.asset }}/rdev-client-gpu" --version > "dist/${{ matrix.asset }}/VERSION.txt"
            if command -v otool >/dev/null 2>&1; then
              otool -L "dist/${{ matrix.asset }}/rdev-client-gpu" > "dist/${{ matrix.asset }}/BUILD_INFO.txt" || true
            fi
            tar -C dist -czf "dist/${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            clients/rdev-client-gpu/dist/${{ matrix.asset }}*.tar.gz
            clients/rdev-client-gpu/dist/${{ matrix.asset }}*.zip
          if-no-files-found: error

  release:
    name: Release Rust GPU client
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          echo "=== Rust GPU release files ==="
          ls -lh release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
